name: CD - Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy secrets to VPS
        run: |
          DEST="${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}"
          printf '%s' "${{ secrets.ENV_FILE }}" > /tmp/deploy.env
          printf '%s' "${{ secrets.RAILS_MASTER_KEY }}" > /tmp/master.key

          ssh -i ~/.ssh/deploy_key "$DEST" "mkdir -p ~/pzlabs-website/config"
          scp -i ~/.ssh/deploy_key /tmp/deploy.env "$DEST:~/pzlabs-website/.env"
          scp -i ~/.ssh/deploy_key /tmp/master.key "$DEST:~/pzlabs-website/config/master.key"
          ssh -i ~/.ssh/deploy_key "$DEST" "chmod 600 ~/pzlabs-website/config/master.key"

      - name: Deploy to VPS
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            ssh -i ~/.ssh/deploy_key \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} \
              "cd ~/pzlabs-website &&
              if [ -d .git ]; then
                git fetch origin && git reset --hard origin/main
              else
                git clone https://github.com/${{ github.repository }}.git .
              fi &&
              docker compose up -d --build &&
              docker compose exec -T web ./bin/rails db:migrate &&
              docker image prune -f"
