default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: pzlabs_website_rails_development

test:
  <<: *default
  database: pzlabs_website_rails_test
  url: <%= ENV['DATABASE_URL'] %>

production:
  primary: &primary_production
    adapter: postgresql
    encoding: unicode
    database: <%= Rails.application.credentials.dig(:db_production, :database) %>
    username: <%= Rails.application.credentials.dig(:db_production, :username) %>
    password: <%= Rails.application.credentials.dig(:db_production, :password) %>
    host: <%= Rails.application.credentials.dig(:db_production, :host) %>
    port: 5432

  queue:
    <<: *primary_production

  cable:
    <<: *primary_production

  cache:
    <<: *primary_production