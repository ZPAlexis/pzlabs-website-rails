      category_html: "<span class='text-highlight'>Categoria:<br></span>Aplicação Web Full-Stack"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      index: "Índice:"
      architecture: "Arquitetura"
      concepts: "Conceitos"
      evolution: "Evolução"
      stack: "Decisões"
      gamification: "Gamificação"
      api: "API"
      deployment: "Deploy"
      design: "Design"
      timeline: "Plano"
      learnings: "Aprendizados"
      overview_1: "Um site de portfólio desenvolvido como um produto real, com suporte a localização, testes, CI/CD, hardening de segurança e um deploy reproduzível que tenho total controle. Criado para demonstrar minha capacidade técnica de entregar projetos em nível de produção e meu interesse em aplicações gamificadas que geram métricas de engajamento. O site que você está visitando é o próprio projeto."
      architecture_1_html: "Cada camada foi desenvolvida para ser reproduzível, algo que posso reconstruir do zero quando necessário. O ambiente de produção é atualizado com um único push para <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main' target='_blank' rel='noopener'>main</a>. O GitHub Actions executa a suíte de testes, constrói a imagem a partir de um Dockerfile multiestágio e provisiona o host com um arquivo docker-compose."
      architecture_2_html: "A posição de cada camada no stack foi uma escolha deliberada, resultado de várias etapas de evolução até chegar à forma atual (detalhadas na <a class='link' href='#evolution'>seção 4</a>). A seguir, os fundamentos por trás de cada uma:"
      architecture_layer_cicd_label: "Camada de CI/CD — GitHub"
      architecture_layer_cicd_flow: "GitHub push → Actions (CI: scan + test) → Actions (CD: SSH deploy)"
      architecture_layer_cicd: "A suíte cobre roteamento, renderização de páginas, o fluxo de coleta de moedas e a lógica de modelos com banco de dados. Escrita deliberadamente para que uma build quebrada não chegue à produção."
      architecture_layer_server_label: "Camada de Servidor — Hostinger VPS & Docker"
      architecture_layer_server_1: "Caddy (TLS) → Docker Compose → web (Puma) + db (Postgres)"
      architecture_layer_server_2_html: "Um único VPS da Hostinger se mostrou o equilíbrio certo entre custo e simplicidade operacional para um projeto deste tamanho. Esta camada passou pela maior evolução — veja mais detalhes na <a class='link' href='#evolution'>seção 4</a>."
      architecture_layer_app_label: "Camada de App — Ruby on Rails"
      architecture_layer_app_1: "i18n Locales → JS de Gamificação ↔ Event API → Cache de Métricas ↔ PostgreSQL"
      architecture_layer_app_2: "O projeto começou como HTML e JavaScript simples, mas o Rails foi a ferramenta certa à medida que cresceu: um monolito robusto e enxuto que consolidou todos os serviços sem a complexidade de micro-serviços externos que o projeto não precisava."
      architecture_layer_content_label: "Camada de Conteúdo — Rails i18n"
      architecture_layer_content: "Suportar múltiplos idiomas era essencial para este portfólio. O i18n nativo do Rails tornou isso direto: rotas por idioma, textos entregues por arquivos YAML e a experiência completa servida em inglês e português."
      architecture_layer_client_label: "Camada de Client — JS de Gamificação"
      architecture_layer_client: "Um jogo interativo onde os visitantes coletam três moedas escondidas, acompanham seu próprio progresso e veem o total acumulado por todos os outros visitantes. É uma demonstração simples e direta de como um design gamificado pode gerar engajamento, e um reflexo do meu interesse em construir sistemas gamificados."
      architecture_layer_data_label: "Camada de Dados — PostgreSQL"
      architecture_layer_data: "O progresso de moedas de cada visitante fica armazenado no localStorage do navegador, enquanto um registro anônimo de eventos no Postgres agrega as coletas de todos os visitantes, criando um senso de comunidade sem armazenar nenhuma informação pessoal."
      concepts_intro: "Este projeto foi criado com a intenção de demonstrar três conceitos principais:"
      concepts_li_1_html: "<span class='text-highlight'>Um portfólio vivo.</span><p class='post-text'>Ambiente de produção auto-hospedado, facilmente reproduzível e totalmente sob meu controle, atualizado com um único <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/commits/main/' target='_blank' rel='noopener'>git push</a>.</p>"
      concepts_li_2_html: "<span class='text-highlight'>Disciplina de produção.</span><p class='post-text'>Docker multiestágio, pipeline de deploy via SSH, cache de API de 12 horas, varreduras de segurança no CI, uma suíte de testes real, CSP e rate limiting. Gestão de projeto e atenção aos detalhes que não são necessários para um portfólio pessoal, mas que demonstram como eu trataria o sistema de qualquer cliente.</p>"
      concepts_li_3_html: "<span class='text-highlight'>Engajamento  mensurável com gamificação.</span><p class='post-text'>Um jogo de moedas que alimenta uma API real, e uma página inicial que fecha a experiência com contadores globais ao vivo. Uma experiência gamificada que demonstra engajamento mensurável.</p>"
      concepts_outro: "Estes conceitos foram os princípios que guiaram cada página e cada decisão de navegação. A experiência de gamificação foi projetada como ponto de entrada para conquistar a atenção do visitante antes de conduzi-lo pelo conteúdo do portfólio em direção ao contato. O fluxo abaixo representa a jornada do usuário que orientou cada decisão de navegação e layout antes de qualquer linha de código ser escrita."
      evolution_intro: "Durante o desenvolvimento deste projeto, a estrutura de back-end e a arquitetura de hospedagem evoluíram com diferentes etapas, cada uma como resposta a restrições reais e uma busca por reduzir complexidade e custo sem perder o controle técnico."
      evolution_phase1_heading: "Fase 1 — GitHub Pages, sem back-end"
      evolution_phase1_1: "GitHub Pages, HTML puro, Javascript, CSS"
      evolution_phase1_2: "O objetivo era colocar o projeto no ar rapidamente usando apenas recursos gratuitos, sem backend e sem serviços externos. O GitHub Pages cuidou da hospedagem e foi o ponto de partida perfeito para o projeto."
      evolution_phase1_3: "Com a base estática no lugar, o próximo passo era dar ao loop de gamificação um passo final. Os visitantes podiam coletar moedas, mas sem um backend não havia como registrar as coletas ou exibir o progresso da comunidade. "
      evolution_phase1_4: "Motivo da migração:"
      evolution_phase1_5: "O loop de gamificação não tinha um passo final. Os visitantes coletavam moedas mas não conseguiam ver o impacto na comunidade. Uma API real era necessária para fechar esse loop."
      evolution_phase2_heading: "Fase 2 — AWS + GitHub Pages"
      evolution_phase2_1: "AWS (EC2 + RDS), Node.js, Express.js, MySQL, HTML, Javascript, CSS"
      evolution_phase2_2: "Para dar suporte à experiência de gamificação com dados reais, desenvolvi uma API Node.js no AWS EC2 e conectei a uma instância RDS MySQL. A AWS facilitou a configuração, mas para um projeto pessoal significava manter dois serviços gerenciados e absorver os custos de datacenters sul-americanos. Migrar para servidores AWS na América do Norte reduziria o valor, mas os dois serviços gerenciados e a cobrança variável por uso continuavam sendo riscos para o projeto."
      evolution_phase2_3: "Com a arquitetura no lugar, foquei em manter o projeto enxuto adicionando cache no servidor para reduzir as consultas ao RDS a cada carregamento de página, e unifiquei a invalidação do cache com a transação de registro de coleta de moedas para que o cache se mantivesse preciso sem uma etapa separada."
      evolution_phase2_4: "Decisões principais:"
      evolution_phase2_5: "Cache adicionado no servidor para reduzir o tráfego no RDS a cada visita à página."
      evolution_phase2_6: "Invalidação de cache com a transação de escrita de moeda para precisão e eficiência."
      evolution_phase2_7: "Motivo da migração:"
      evolution_phase2_8: "Dois serviços gerenciados (EC2 + RDS) adicionaram complexidade operacional difícil de justificar para um projeto de desenvolvedor solo."
      evolution_phase2_9: "A AWS custava cerca de $40 USD por mês via créditos do plano gratuito, sem um teto claro para os custos futuros à medida que o uso pudesse crescer. Migrar para servidores AWS na América do Norte teria resolvido parcialmente o custo, mas ainda deixaria dois serviços gerenciados e uma cobrança mensal variável. O plano de custo fixo de 2 anos da Hostinger por $30 BRL (~$6 USD) por mês, também hospedado na América do Norte, eliminou os dois problemas de uma só vez."
      evolution_phase3_heading: "Fase 3 (atual) — Hostinger VPS + Rails"
      evolution_phase3_1: "Hostinger, Docker, Ruby on Rails, PostgreSQL, Caddy"
      evolution_phase3_2: "Refatorei o projeto em um monolito Rails e hospedei em um único VPS da Hostinger provisionado com Docker Compose. Tudo que antes estava dividido entre Github Pages, EC2 e RDS agora vive em um único ambiente reproduzível, com deploy automático a cada push para main. "
      evolution_phase3_3: "O monolito eliminou a latência de chamadas a uma API externa e os custos de operação do EC2 + RDS. Também permitiu que o contador da comunidade fosse atualizado em tempo real a cada coleta de moeda, sem recarregamento de página e sem polling, algo que não era prático com uma API externa."
      evolution_phase3_4: "O Railway foi avaliado como alternativa, mas um VPS oferece visibilidade completa do ambiente sem abstrações que escondam a infraestrutura, e a flexibilidade de continuar expandindo com novos serviços no futuro."
      evolution_phase3_5: "Decisões principais:"
      evolution_phase3_6: "Consolidação da API EC2 + RDS em um único monolito Rails com um codebase, um servidor e custo fixo menor."
      evolution_phase3_7: "Provisionamento com Docker Compose, totalmente reproduzível a partir do código-fonte, com deploy automático a cada push."
      evolution_phase3_8: "Contador da comunidade em tempo real, atualizado a cada coleta, sem recarregamento de página ou polling."
      stack_intro: "Algumas decisões neste projeto foram definidas desde o início, enquanto outras surgiram à medida que o projeto evoluiu. Ambas refletem como avaliei tradeoffs e tomei decisões técnicas durante esse processo."
      stack_decisions_heading: "Decisões que tomei deliberadamente:"
      stack_defaults_heading: "Padrões de Rails 8 adotados:"
      stack_decision_1_html: "<p class='post-text'><span class='post-emphasis'>i18n bilíngue</span> com <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/routes.rb' target='_blank' rel='noopener'>routes</a> (scope '(:locale)', locale: /en|pt/) por <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main/config/locales' target='_blank' rel='noopener'>locales</a> para alcançar ambos públicos sem manter páginas ou codebases separados.</p>"
      stack_decision_2_html: "<p class='post-text'><span class='post-emphasis'>Cadeia de detecção de idioma</span> (URL → cookie → cabeçalho Accept-Language no <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/application_controller.rb' target='_blank' rel='noopener'>ApplicationController</a>) para que os visitantes recebam o idioma correto automaticamente, sem necessidade de seleção manual.</p>"
      stack_decision_3_html: "<p class='post-text'><span class='post-emphasis'>Sistema de design CSS construído manualmente</span> com design <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>tokens.css</a> e sem framework CSS, para ter controle total da linguagem visual e evitar a introdução de uma dependência de framework.</p>"
      stack_decision_4_html: "<p class='post-text'><span class='post-emphasis'>Experiência gamificada</span> de coleta de moedas com três mini-games distintos: <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/index.js' target='_blank' rel='noopener'>index.js</a> iniciando a moeda escondida na caixa, a barra de preenchimento por momentum em <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/fillBar.js' target='_blank' rel='noopener'>fillBar.js</a>,  e pedra-papel-tesoura em <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/rock-paper-scissors.js' target='_blank' rel='noopener'>rock-paper-scissors.js</a>; com persistência em localStorage via <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>gameState.js</a>, para demonstrar como a gamificação pode gerar engajamento e refletir meu interesse genuíno em construir sistemas gamificados.</p>"
      stack_decision_5_html: "<p class='post-text'><span class='post-emphasis'>API de rastreamento de eventos</span> <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/api/events_controller.rb#L6' target='_blank' rel='noopener'>POST /api/record-event</a> registrando cada moeda por cliente anônimo para dar ao loop de gamificação um ponto final mensurável e conectar ações individuais a um total compartilhado pela comunidade.</p>"
      stack_decision_6_html: "<p class='post-text'><span class='post-emphasis'>Métricas ao vivo</span> agregadas no servidor <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb' target='_blank' rel='noopener'>MetricsCalculator</a> exibidas como contadores globais na página inicial para adicionar uma dimensão comunitária que dá significado compartilhado a cada coleta individual e motiva maior participação.</p>"
      stack_decision_7_html: "<p class='post-text'><span class='post-emphasis'>Cache Rails de 12 horas</span> no <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb#L3' target='_blank' rel='noopener'>MetricsCalculator#L3</a> para servir do cache e evitar recálculo dos mesmo valores a cada carregamento de página.</p>"
      stack_decision_8_html: "<p class='post-text'><span class='post-emphasis'>Invalidação de cache</span> a cada nova coleta em <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb#L8' target='_blank' rel='noopener'>MetricsCalculator#L8</a> atualizando as métricas na mesma transação da escrita de moeda para manter o contador preciso sem uma etapa separada.</p>"
      stack_decision_9_html: "<p class='post-text'><span class='post-emphasis'>Identidade anônima do cliente</span> via cookie UUID httpOnly, SameSite=Lax, com validade de 1 ano <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/api/events_controller.rb#L48' target='_blank' rel='noopener'>EventsController#L48</a> para coletar dados de participação sem exigir contas, diálogos de consentimento ou qualquer informação pessoal do visitante.</p>"
      stack_decision_10_html: "<p class='post-text'><span class='post-emphasis'>Migração do AWS</span> (EC2 + RDS) para um único host <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/Dockerfile' target='_blank' rel='noopener'>Docker</a> por simplicidade de custo e operação.</p>"
      stack_decision_11_html: "<p class='post-text'><span class='post-emphasis'>Docker Compose</span> <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml' target='_blank' rel='noopener'>docker-compose.yml</a> em um único VPS para um ambiente consolidado e reproduzível, com deploy automático a cada push.</p>"
      stack_decision_12_html: "<p class='post-text'><span class='post-emphasis'>Suíte de testes CI</span> no GitHub Actions (testes unitários + de sistema, Brakeman, bundler-audit, importmap audit, RuboCop) e deploy CD via SSH com retry <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main/.github/workflows' target='_blank' rel='noopener'>.github/workflows/</a> para manter a disciplina de produção e garantir que uma build quebrada nunca chegue ao ambiente de produção.</p>"
      stack_decision_13_html: "<p class='post-text'><span class='post-emphasis'>Hardening de segurança:</span> CSP, rate limiting <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/initializers/rack_attack.rb#L3' target='_blank' rel='noopener'>Rack::Attack</a>, CSRF, validação de moedas no modelo <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/models/coin_event.rb#L6' target='_blank' rel='noopener'>CoinEvent</a>, suíte de testes completa; para evitar regressões e aplicar os mesmos padrões de segurança que usaria em qualquer projeto de cliente.</p>"
      stack_default_1_html: "<p class='post-text'><a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml#L21' target='_blank' rel='noopener'>Puma</a> como servidor de aplicação Rails e <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml#L2' target='_blank' rel='noopener'>Caddy</a> como proxy reverso, ambos boas opções para um deploy em VPS único.</p>"
      stack_default_2_html: "<p class='post-text'>Migração do MySQL (usado na Fase 2 pelos padrões do AWS RDS) para PostgreSQL na Fase 3, com suporte mais profundo ao Active Record e banco de dados preferido do Rails (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/database.yml' target='_blank' rel='noopener'>config/database.yml</a>).</p>"
      stack_default_3_html: "<p class='post-text'>A <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>lógica</a> de gamificação foi escrita antes da migração para Rails e mantida em vanilla JS. O Stimulus é projetado para interatividade leve em páginas renderizadas pelo servidor, não para game loops com estado, então a abordagem original continuou sendo a mais adequada.</p>"
      stack_default_4_html: "<p class='post-text'>Hardening do Docker em produção com usuário não-root, alocador de memória jemalloc e precompilação do bootsnap (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/Dockerfile' target='_blank' rel='noopener'>Dockerfile</a>) para um container mais leve e rápido e para manter o uso de recursos baixo em um VPS de custo fixo.</p>"
      stack_default_5_html: "<p class='post-text'>Solid Cache rodando no banco de dados para o cache de 12 horas do MetricsCalculator (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/environments/production.rb#L55' target='_blank' rel='noopener'>production.rb</a>) para evitar rodar uma instância Redis separada e manter toda a persistência no banco de dados existente.</p>"
      stack_default_6_html: "<p class='post-text'>Importmap-rails entregando ES modules (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/importmap.rb' target='_blank' rel='noopener'>config/importmap.rb</a>) para servir JavaScript sem uma etapa de build, mantendo o pipeline de deploy simples e removendo Node como dependência.</p>"
      stack_default_7_html: "<p class='post-text'>Manifesto PWA habilitado para UX mobile sem lógica offline adicional (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/views/layouts/application.html.erb#L19' target='_blank' rel='noopener'>application.html.erb#L19</a>) para que visitantes no celular possam instalar o site como um app, caso queiram.</p>"
      gamification_1: "Gamificação é a aplicação de elementos de jogo para motivar o engajamento do usuário, uma área pela qual tenho forte interesse. O objetivo era demonstrar como mecânicas simples de jogo podem tornar um portfólio pessoal memorável, com toda a experiência projetada para se desenrolar em um único scroll da página inicial."
      gamification_2: "O diagrama acima descreve o fluxo de três etapas: descoberta ao longo do scroll da página, clareza de objetivo através do overlay, e a recompensa comunitária no final. Cada jogo foi escrito manualmente em vanilla JS como um módulo independente, sem nenhum framework de jogo. As seções abaixo descrevem como cada parte foi construída."
      gamification_3: "Elementos principais da experiência de jogo:"
      gamification_li_1_html: "<span class='text-highlight'>Moeda Escondida <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/index.js' target='_blank' rel='noopener'>index.js</a></span><p class='post-text'>Uma moeda intencionalmente escondida na página como primeiro desafio de descoberta. O overlay indica sua localização para que os visitantes possam voltar para coletá-la caso passem por ela.</p>"
      gamification_li_2_html: "<span class='text-highlight'>Encha a Barra <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/fillBar.js' target='_blank' rel='noopener'>fillBar.js</a></span><p class='post-text'>Uma barra baseada em momentum que é preenchida por pressões repetidas no botão e decai ao longo do tempo se deixada sozinha. Um cronômetro integrado registra a velocidade de conclusão, armazena o melhor tempo pessoal e incentiva tentativas repetidas para superá-lo.</p>"
      gamification_li_3_html: "<span class='text-highlight'>Pedra Papel Tesoura <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/rock-paper-scissors.js' target='_blank' rel='noopener'>rock-paper-scissors.js</a></span><p class='post-text'>Um jogo de três opções onde o computador escolhe aleatoriamente. Os resultados são registrados entre sessões com contagens de vitórias, empates e derrotas exibidas no overlay.</p>"
      gamification_li_4_html: "<span class='text-highlight'>Estado Central do Jogo <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js#L11' target='_blank' rel='noopener'>gameState.js#L11</a></span><p class='post-text'>Um gerenciador de estado construído manualmente que coordena toda a lógica de moedas sem um framework. Cada coleta segue um padrão consistente: atualizar o estado, persistir no localStorage, verificar a conclusão, sincronizar com o servidor e atualizar as métricas da comunidade. O estado das moedas é armazenado no localStorage para persistência entre visitas e sincronizado com o servidor a cada coleta. Isso mantém a experiência com estado sem exigir login, enquanto ainda registra eventos para as métricas da comunidade. Nenhuma biblioteca externa envolvida.</p>"
      gamification_li_5_html: "<span class='text-highlight'>Overlay de Resumo <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/uiElements.js#L23' target='_blank' rel='noopener'>uiElements.js</a></span><p class='post-text'>O elemento de conexão que transforma três mini-games separados em uma experiência coerente. Acompanha o progresso da coleta, indica a localização de cada moeda e exibe a visão comunitária com estatísticas de participação ao vivo.</p>"
      gamification_li_6_html: "<span class='text-highlight'>Métricas Comunitárias ao Vivo <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js#L55' target='_blank' rel='noopener'>gameState.js#L55</a></span><p class='post-text'>Cada coleta é registrada anonimamente no banco de dados, contribuindo para uma contagem comunitária ao vivo exibida a todos os visitantes. As métricas são armazenadas em cache a cada escrita e protegidas por rate limiting para manter os dados confiáveis.</p>"
      api_1: "Cada coleta de moeda é registrada como um evento anônimo. Sem conta, sem dados pessoais, apenas um UUID armazenado em um cookie httpOnly que persiste entre visitas."
      api_2_html: "A cada coleta, o <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>gameState.js</a> escreve no localStorage para manter o estado do jogo no lado do cliente e então chama a API para registrar o evento no servidor. Os nomes das moedas são validados contra uma lista fixa antes da escrita, e o endpoint é protegido por rate limiting para evitar abusos."
      api_3_html: "O <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb' target='_blank' rel='noopener'>MetricsCalculator</a> agrega a tabela coin_events em totais comunitários e armazena o resultado em cache por 12 horas, para que cada novo visitante receba os contadores da página inicial rapidamente, sem disparar uma nova consulta ao banco de dados a cada chegada."
      deployment_1_html: "Um push para <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main' target='_blank' rel='noopener'>main</a> inicia o fluxo completo de CI no GitHub Actions (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/.github/workflows/ci.yml' target='_blank' rel='noopener'>.github/workflows/ci.yml</a>). Varreduras de segurança (Brakeman, bundler-audit, importmap audit), uma verificação de linting com RuboCop e uma suíte de testes cobrindo respostas de controllers, validações de modelos, lógica de cache do MetricsCalculator e um smoke test com Selenium headless rodam em paralelo. Apenas uma build verde avança para o deploy."
      deployment_2_html: "O workflow de deploy (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/.github/workflows/deploy.yml' target='_blank' rel='noopener'>.github/workflows/deploy.yml</a>) conecta via SSH, executa o build Docker multiestágio e sobe o stack com docker-compose. Uma lógica de retry foi adicionada após encontrar timeouts intermitentes de SSH nos runners do GitHub Actions."
      design_1: "A decisão de construir o sistema de design manualmente, em vez de usar Tailwind ou Bootstrap, foi intencional. Este projeto foi uma oportunidade para desenvolver minhas habilidades de design e construir algo que fosse genuinamente meu do início ao fim. Um framework teria sido mais rápido, mas velocidade não era o objetivo aqui."
      design_2_html: "O resultado é um arquivo <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>tokens.css</a> que define toda a linguagem visual: tipografia, escala de cores, espaçamento e breakpoints, mantendo a consistência visual nos jogos, nas páginas de projeto e no layout bilíngue, sem dependência de framework."
      design_3: "Outras escolhas de design deliberadas foram: botões com estilo glass-morphism, uma barra de navegação inferior no mobile e um layout mobile-first totalmente desenvolvido no Figma antes de qualquer linha de CSS ser escrita."
      timeline_1: "Cada fase deste projeto foi tratada como um produto completo e pronto para lançamento antes de avançar. A fase de planejamento reflete uma decisão deliberada de projetar toda a experiência do usuário no Figma antes de escrever qualquer código. A fase de monitoramento no final não foi uma limpeza não planejada; representa o ponto em que a arquitetura estava estável o suficiente para adicionar polimento de produção, testes abrangentes e hardening de segurança."
      timeline_2: "A Fase 3 não fazia parte do plano original do projeto. Foi introduzida como uma etapa necessária após as restrições encontradas na Fase 2. A AWS parecia o ambiente de produção certo na época, mas a complexidade operacional e o custo de rodar EC2 e RDS para um projeto de portfólio se mostraram difíceis de justificar. Essa restrição levou à descoberta da abordagem de monolito Rails e à consolidação de tudo em um único VPS. O resultado foi uma solução mais adequada ao escopo deste projeto, que não teria sido encontrada sem passar pela Fase 2 primeiro."
      learnings_intro_1: "Este projeto nasceu com o objetivo de ser um portfólio vivo. Um lugar para demonstrar meu interesse em gamification e mostrar minhas habilidades como solutions engineer e desenvolvedor. Ao longo do caminho, surgiu uma pergunta mais específica: quanta disciplina de produção eu conseguiria aplicar a um site pessoal? A resposta abrangeu decisões de infraestrutura, arquitetura de back-end, design de gamification e deployment contínuo. Cada decisão foi tomada deliberadamente para refletir como eu trataria o sistema de qualquer cliente."
      learnings_intro_2: "O resultado final é a página que você está visitando agora. A documentação que você esta lendo e o produto entregue são a mesma coisa."
      learnings_intro_3: "Estes são os aprendizados mais significativos da construção deste projeto:"
      learnings_li_1_html: "<span class='text-highlight'>Dimensionando a infraestrutura corretamente.</span><p class='post-text'>A necessidade de uma API externa revelou quantas opções de infraestrutura existem e como é fácil buscar mais do que um projeto realmente precisa. Implementar a AWS na Fase 2 me ensinou que uma abordagem cloud-native pode ser excessiva para o escopo errado.</p><br><p class='post-text'>Dois serviços gerenciados adicionaram custo e complexidade que o projeto não precisava. Essa restrição levou à descoberta da abordagem de monolito Rails. Combinado com um host Docker que eu controlo completamente, essa escolha se mostrou a melhor decisão de engenharia. A stack ficou mais simples de operar, mais fácil de reproduzir e mais adequada ao escopo real do projeto.</p>"
      learnings_li_2_html: "<span class='text-highlight'>Ruby on Rails permite que um dev solo trabalhe de forma enxuta.</span><p class='post-text'>A estrutura de monolito significou menos partes móveis para construir, monitorar e manter. Com o banco de dados diretamente conectado à camada de aplicação, o modelo de dados pôde evoluir sem negociar um contrato de API entre serviços.</p><br><p class='post-text'>Ter o front-end e o back-end em uma única codebase reduziu a troca de contexto e permitiu um fluxo de trabalho mais ágil ao longo do projeto. Rails não é a solução ideal para toda infraestrutura, mas para um desenvolvedor solo com controle total da stack, foi a decisão mais produtiva do projeto.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Gamificação realmente brilha quando é mensurável.</span><p class='post-text'>Um dos principais objetivos era demonstrar como elementos simples de gamificação podem engajar visitantes de forma significativa. Os três mini-games criaram um fluxo coeso com um objetivo final claro, mas a gamificação só se tornou verdadeiramente atraente quando passou a ser mensurável.</p><br><p class='post-text'>Adicionar métricas comunitárias ao vivo baseadas na participação de visitantes anteriores foi a decisão que fechou o ciclo do usuário. Transformou o engajamento individual em um número compartilhado que todo visitante pode ver e para o qual pode contribuir. Na minha visão, essa camada comunitária é o que separa simples elementos de jogos de experiências de gamificação memoráveis.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Um sistema de design de tokens compensa em todas as páginas.</span><p class='post-text'>Um único arquivo de tokens manteve cada página, jogo e layout bilíngue visualmente coerente, sem dependência de um framework. O escopo permaneceu pequeno, o bundle permaneceu leve, e qualquer alteração de estilo se propagou de forma consistente por todo o site.</p><br><p class='post-text'>A decisão de construir o sistema de design manualmente, em vez de usar um framework, foi deliberada. Este projeto foi uma oportunidade de desenvolver minhas próprias habilidades de design e construir algo inteiramente meu. Um framework teria sido mais rápido, mas a propriedade total da linguagem visual era o objetivo, e a estrutura de <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>tokens</a> provou ser a fundação certa para um projeto deste escopo.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Tratar um projeto pequeno como produção é exatamente o ponto.</span><p class='post-text'>Este projeto foi desenvolvido com a mesma disciplina que eu aplicaria ao sistema de qualquer cliente. Hardening de segurança, rate limiting, uma suite de testes completa e um pipeline de CI/CD adequado são todos exercícios deliberados. Um portfólio pessoal não exige estritamente nenhum deles, mas os hábitos formados em projetos como esse são a base que qualquer sistema de produção sério exige.</p><br><p class='post-text'>Sistemas enterprise são infinitamente mais complexos, mas a atenção ao detalhe que os mantém sustentáveis começa precisamente com esse tipo de prática. A escala do projeto era pequena. O padrão aplicado não era.</p>"
      closing: "Obrigado por conhecer mais sobre esse projeto!"
