      category_html: "<span class='text-highlight'>Categoria:<br></span>App Mobile de Produtividade"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      inspiration_html: "<span class='text-highlight'>Inspiração:<br></span>Duolingo"
      index: "Índice:"
      objective: "Objetivo"
      objective_1: "Trofy é um aplicativo para dispositivos móveis com o objetivo de ajudar a atingir metas — gamificando objetivos pessoais para reforçar o desenvolvimento de bons hábitos. O nome faz referência ao ato de receber um troféu, dado por você a você mesmo."
      objective_2: "Depois de anos lutando contra a procrastinação na juventude, aos poucos ficou claro que a melhor forma de criar motivação para manter novos hábitos era documentar e revisar o progresso ao longo do tempo. Ver tendências históricas de pequenas melhorias me motivavam a continuar. O objetivo com o Trofy foi transformar essa metodologia em um jogo que inspirasse outras pessoas a focarem em melhoria pessoal de uma forma gamificada."
      objective_3: "A ideia do app foi inspirada na metodologia gamificada de educação do Duolingo, onde os usuários têm metas de progresso claras, ganham pontos para gastar em vidas extras e podem facilmente optar por competir com outros usuários em rankings dentro do app, com múltiplos níveis de dificuldade."
      concepts: "Conceitos"
      concepts_1: "A estrutura do aplicativo é dividida em três pilares:"
      concepts_2: "1. Experiência gamificada"
      concepts_3: "Embora Trofy, em sua essência, seja um app no estilo ‘lista de tarefas’, seu principal aspecto é lembrar ao usuário que ele está jogando um jogo ao completar tarefas de objetivos pessoais."
      concepts_4: "O sistema de gamificação foi criado para motivar os usuários com dois ciclos de feedback positivo na conclusão de desafios: um troféu como recompensa e níveis de maestria ao manter uma certa consistência de uso."
      concepts_5: "Um desafio no Trofy é definido por uma atividade que deve ser completada pelo menos uma vez por semana. Isso significa que o usuário pode ganhar um Troféu toda semana e subir de nível nesse desafio todo mês."
      concepts_6: "O MVP do Trofy focou em construir a experiência gamificada principal, incluindo a interface do usuário e feedback visual. Funcionalidades de comunidade, como competições, compartilhamento de objetivos e contas de usuário ficaram fora do escopo, pois exigiriam um desenvolvimento de backend muito maior do que o tempo disponível para o projeto. No entanto, essas funcionalidades seriam essenciais para tornar o app totalmente gamificado e pronto para um lançamento completo (v1.0)."
      concepts_7: "2. Definição de metas para melhoria pessoal"
      concepts_8: "O principal motivo para usar o app é poder criar, atualizar e revisar rapidamente objetivos pessoais importantes."
      concepts_9: "Um desafio no Trofy é definido por uma tarefa que precisa ser completada pelo menos uma vez por semana. Ao criar um desafio, o usuário pode personalizar duas propriedades principais:"
      concepts_10_html: "<span class='text-highlight'>Frequência (Dificuldade):</span><p class='post-text'>Define o número de dias na semana em que a tarefa precisa ser realizada. Um desafio pode ser uma única tarefa semanal ou algo que precisa ser completado todos os dias.</p>"
      concepts_11_html: "<span class='text-highlight'>Dia de início da semana (Início):</span><p class='post-text'>Define quando o desafio começa e o dia da semana em que ele se reinicia. Se o objetivo começar numa quarta-feira, significa que o desafio semanal sempre começa na quarta e termina na próxima terça-feira ao final do dia.</p>"
      concepts_12: "3. Acompanhamento de progresso e análise de desempenho"
      concepts_13: "Cada objetivo mostra claramente seu progresso, para que o usuário tenha uma visão geral rápida de como está indo. Como cada objetivo pode ter uma quantidade diferente de dias exigidos por semana, cada objetivo terá sua própria porcentagem de progresso para aquela semana e histórico desde sua criação."
      concepts_14: "O usuário também pode deixar uma anotação e avaliar de 1 a 5 estrelas cada dia da semana. Essa funcionalidade simples dá um contexto adicional ao progresso quando o usuário revisa sua evolução posteriormente."
      concepts_15: "A aba de progresso é onde tudo se junta para mostrar rapidamente quanto o usuário melhorou desde que começou a usar o app. Poder revisar a evolução geral em um piscar de olhos é o principal fator motivador para trazer os usuários de volta ao app e continuar focando em suas prioridades pessoais."
      user: "Flow"
      user_1: "O objetivo do Trofy de incentivar bons hábitos guiou a estrutura da jornada do usuário. A experiência foi desenhada como um ciclo de feedback positivo, motivando os usuários a superar suas metas e voltar regularmente para continuar evoluindo."
      user_2: "Em sua essência, o app funciona como uma lista de tarefas. A maior diferença além da gamificação é a possibilidade de acompanhar o progresso passado, observar tendências e oferecer oportunidades para o usuário refletir e reorganizar suas prioridades."
      tech: "Stack"
      tech_1: "Desenvolver alguns jogos demo anteriormente no Unity inspirou esse projeto e forneceu uma base sólida para criação de um app gamificado. O Unity ofereceu uma forma confiável de desenvolver a lógica por trás de objetos animados e uma solução prática para portar a aplicação para dispositivos móveis iOS e Android."
      tech_2: "C# é a linguagem de programação usada no Unity. Depois de aprender os fundamentos da linguagem, foi gratificante implementar lógicas mais desafiadoras, como o controlador de notificações, os sistemas de salvamento de dados e os gerenciadores de listas diárias."
      tech_3_html: "Essa também foi a primeira experiência utilizando ferramentas de IA para aprimorar o código que estava escrevendo e auxiliar em lógicas mais complexas que iam além do meu conhecimento. Escrevi mais detalhes sobre o uso dessas ferramentas na <a class='link' href='#ai'>seção de aprendizados</a> e na <a class='link' href='/about.html'>página sobre mim</a>."
      logic: "Arquitetura"
      logic_1: "O componente central do sistema lógico do Trofy é focado nos objetos da lista de dias (Day List), sendo usado e referenciado por todos os principais componentes do app."
      logic_2: "Cada desafio gera uma lista de dias dentro do período de uma semana. Essa lista é então atualizada pelo Controlador do Usuário através das entradas do usuário e acessada pelo Controlador de Datas para exibir os desafios aplicáveis do dia e qualquer histórico de conclusão na aba de progresso."
      logic_3: "Este é o código que controla a geração inicial da lista de dias da semana a partir do Controlador de Desafios. Uma vez que a semana inicial é concluída, o código aciona automaticamente a geração de semanas adicionais para os próximos períodos de objetivo."
      logic_4: "Outro ponto de destaque no design do Trofy é a lógica por trás das notificações enviadas pelo app. Notificações por push são um dos maiores benefícios de trabalhar com dispositivos móveis. Para criar uma experiência envolvente e eficiente, foi crucial implementar um sistema que envie lembretes periódicos e mensagens motivacionais para trazer o usuário de volta após períodos de inatividade."
      logic_5: "O sistema de notificações do Trofy foi estruturado com três tipos de agendamento:"
      logic_6_html: "<span class='text-highlight'>Notificações de Prioridade</span><p class='indent'>Lembretes sobre quantos dias restam para completar um desafio ainda não concluído na semana — “Esta é sua última chance de ganhar um 🏆 essa semana!”.</p>"
      logic_7_html: "<span class='text-highlight'>Notificações de Reinício</span><p class='indent'>Lembretes sobre o início de uma nova semana — “O exercício começa de novo hoje, comece com força 💪”.</p>"
      logic_8_html: "<span class='text-highlight'>Notificações de Lembrete</span><p class='indent'>Lembretes motivacionais para trazer o usuário de volta ao app após vários dias de inatividade — “Suas lutas te tornam mais forte. Seus obstáculos pavimentam o caminho para o sucesso 💯”.</p>"
      logic_9: "Outra funcionalidade que vale destacar foi o sistema de localização criado para o alterar o idioma do aplicativo. Com um simples toque, os usuários podem mudar a língua do app instantaneamente."
      logic_10: "O sistema de localização funciona substituindo o texto com base em tabelas no estilo planilha, que mapeiam cada elemento da interface para sua tradução."
      design: "Design"
      design_1: "O objetivo visual do Trofy era fazer toda a experiência parecer um jogo. Uma ‘lista de tarefas’ é algo que você consulta para marcar o que já foi feito; no Trofy, você retorna para ganhar recompensas em um jogo ao completar essas tarefas. Todos os elementos usados foram escolhidos propositalmente para lembrar jogos mobile como Clash of Clans e designs de apps gamificados como o Duolingo."
      design_2_html: "O personagem principal do Trofy foi desenhado e criado no Photoshop, enquanto o restante dos elementos da interface foram assets adquiridos na <a class='link' href='https://assetstore.unity.com/packages/2d/gui/gui-pro-casual-game-176695' target='_blank'>Unity Asset Store</a>."
      wireframe: "Wireframe"
      wireframe_1: "Esse é um wireframe simples que ajudou a iniciar o projeto. O resultado final é bem diferente deste exemplo, mas esse processo ajudou a organizar a estrutura de informações necessária para uma experiência de usuário melhor."
      roadmap: "Plano"
      roadmap_1: "Embora esse projeto tenha sido construído como um experimento de experiências gamificadas, o planejamento foi estruturado da mesma forma de um projeto para um cliente. O MVP inicial v0.1 do Trofy foi lançado para testes em seis semanas, mas o projeto continuou em desenvolvimento por mais alguns meses, recebendo atualizações até a v0.4 com a adição do controlador de notificações e correções de problemas encontrados durante os testes com usuários."
      demo: "Demo"
      demo_1: "O app está disponível apenas em dispositivos Android através de um arquivo .apk."
      demo_2: "Infelizmente não foi possível manter o app disponível nas lojas de iOS e Android, já que ambas as plataformas exigem atualizações frequentes para manter apps de teste disponíveis."
      demo_btn: "Baixar Arquivo .APK"
      learnings: "Aprendizados"
      learnings_1: "Este projeto cobriu grande parte das etapas de desenvolvimento de produto, da ideação ao lançamento de uma versão MVP para testes de usuário em dispositivos iOS e Android. Também destacou as possibilidades de apps gamificados usando uma engine como o Unity e deixou claro o esforço necessário para levar este projeto até um lançamento completo v1.0."
      learnings_2: "Esses são os aprendizados e observações mais importantes deste projeto:"
      learnings_li_1_html: "<span class='text-highlight'>Potencial de experiências gamificadas</span><p class='post-text'>A experiência criada com os visuais e funcionalidades do Trofy foi um ótimo primeiro passo para desenvolver uma experiência totalmente gamificada, mas não foi suficiente. Para atingir esse objetivo completamente, seria necessário adicionar suporte a competições entre usuários e recursos de comunidade para competir e compartilhar objetivos dentro do app. Isso exigiria um investimento de tempo significativo na estruturação do backend, indo além do prazo inicial do projeto.</p>"
      learnings_li_2_html: "<span class='text-highlight'>Funcionalidades para um lançamento completo</span><p class='post-text'>O escopo deste projeto foi limitado para garantir a entrega de um MVP funcional que comunicasse corretamente a proposta de valor idealizada com o Trofy. Criar um senso de comunidade com competições internas e rankings seria o próximo pilar de foco antes de um lançamento completo do app.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Suporte remoto de backend</span><p class='post-text'>O Trofy foi desenvolvido para rodar totalmente local, sem funcionalidades online, o que significa que o suporte ao backend se restringia ao armazenamento local do dispositivo. Um setup de backend adequado, com um servidor Node.js para autenticação de usuários, armazenamento de dados e futuras funcionalidades de comunidade, seria o próximo passo necessário para um possível lançamento completo.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Apps mobile com Unity Engine</span><p class='post-text'>O Unity fornece uma das melhores soluções para portar uma aplicação como app nativo para iOS (Xcode) e Android (Gradle). O processo é tão descomplicado que pouca customização de código é necessária para transferir a mesma aplicação entre plataformas. A única diferença significativa que tivemos que customizar no Trofy foi o sistema de notificações, devido às diferentes estruturas de gatilhos em cada plataforma.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Programando com IA</span><p class='post-text'>Essa foi a primeira vez que testei ferramentas de Inteligência Artificial na revisão de código, e a experiência foi reveladora. Essas ferramentas são ótimas para rápida criação de códigos complexos, mas rapidamente se tornam um obstáculo para retenção de conhecimento e re-aplicação em situações semelhantes. Aprendi que é importante saber discernir quais aplicações a ferramenta realmente pode ser beneficente. Mais detalhes sobre o uso dessas ferramentas está disponível na <a class='link' href='/about.html#ai'>página sobre mim.</a></p>"
      closing: "Obrigado por conhecer mais sobre esse projeto!"
