  about:
    bio_availability: "Procurando oportunidades"
    bio_role: "Engenheiro de Soluções"
    bio_location: "São Paulo, Brasil"
    services: "Soluções"
    intro_1: "Meu nome é Alexis Coelho. Sou Engenheiro de Soluções, MBA, Engenheiro de Produção, e mais importante — um grande nerd."
    intro_2_html: "<span>Eu crio soluções digitais que motivam engajamento de usuários.</span> Minhas aplicações são voltadas a melhoria pessoal, programas de fidelidade de marca, e ferramentas internas de treinamento e alinhamento."
    intro_3: "Meu foco está no design e implementação de aplicações inspiradas em jogos com potencial de gerar experiências memoráveis."
    services_title: "Soluções"
    intro_4: "Essas são as categorias de soluções que atuo:"
    intro_services_title_1: "Automações & Integrações"
    intro_services_description_1: "Consultoria de processos operacionais. Automações de sistemas, colaboração interna e externa, integração de sistemas de eficiência, tomada de decisão, funil de vendas, e engajamento de clientes."
    intro_services_title_2: "Sistemas de Gamificação"
    intro_services_description_2: "Design e desenvolvimento de experiências interativas e sistemas lógicos influenciados por elementos de jogos para aplicações novas ou existentes. Focado em influenciar ações de usuários para objetivos pessoais ou indicadores de performance da marca."
    intro_services_title_3: "Desenvolvimento de Websites"
    intro_services_description_3: "Implementação full-stack desde a ideação até lançamento. Servidores back-end e desenvolvimento de aplicações front-end. Soluções totalmente independentes ou em plataformas padrões do cliente."
    skills_title: "Tecnologias"
    intro_5: "Essas são algumas das principais tecnologias que uso frequentemente em meus projetos, ou que utilizei extensivamente no passado:"
    intro_prototyping: "Protótipos"
    intro_kpis: "Painéis de KPIs"
    interests_title: "Interesses"
    interests_1: "Entender como e por que certas tecnologias funcionam sempre foi o que guiou a maioria das minhas escolhas de aprendizado até hoje. Uma das primeiras perguntas que lembro ter quando criança era — como uma geladeira funciona? — parecia mágica, e eu precisava entender aquela máquina. A mesma curiosidade surgiu com programação, jogos, e então sistemas de gamificação, que me levou a explorar a psicologia e decisões por trás de programas de recompensa que conseguem nos motivar de maneiras irracionais."
    interests_2: "Eu mexo com computadores e sistemas de software desde que me conheço como pessoa. Ganhei meu primeiro computador aos 11 anos, e alguns anos depois já estava montando e desmontando computadores e configurando e hosteando servidores para jogos online."
    interests_3: "Como um grande nerd, sempre fui fascinado pela interseção entre mecânicas de jogos e a vida real. Completar um álbum de figurinhas ou ganhar uma estrelinha por uma prova bem feita foram minhas primeiras experiências com sistemas de recompensa gamificados."
    interests_4: "Você já deve ter percebido que jogos foram uma presença constante na minha vida. Começou como uma forma de desconectar do mundo, mas com o tempo evoluiu em uma fascinação de entender como experiências interativas podem ser criadas para gerar momentos inesquecíveis. Hoje meu objetivo é explorar essa fascinação e aplicar sistemas criativos inspirados em jogos nas situações certas da vida real."
    interests_5: "Esses são minhas principais áreas de interesse:"
    interests_technology_title: "Tecnologia"
    interests_technology: "Experiências digitais, ferramentas de produtividade, e dispositivos inteligentes."
    interests_gaming_title: "Jogos"
    interests_gaming: "Experiências focadas em história, jogos indie, e jogos de tabuleiro."
    interests_fantasy_title: "Fantasia"
    interests_fantasy: "Mundos fictícios, Dungeons & Dragons, e livros classicos."
    interests_3dp_title: "Impressão 3D"
    interests_3dp: "Design de modelos, 360 Fusion, e modelos funcionais."
    interests_fitness_title: "Fitness"
    interests_fitness: "Bem-estar, alongamento, calistenia, e meditação."
    background_title: "Histórico"
    background_1: "Trabalhei com uma variedade de pequenas e médias empresas e colaborei com diversos tipos de equipes de vendas."
    background_2: "Grande parte da minha carreira foi influenciada pela graduação em Engenharia de Produção, que me ajudou a desenvolver uma facilidade em digerir processos complexos e realinhá-los a estratégias de sistemas em constante evolução."
    background_3: "Minha carreira pós-graduação começou em um fornecedor de skids de gás comprimido para a indústria de óleo e gás, onde meu foco era gerenciar todo o processo de montagem, desde a compra dos equipamentos até a entrega das unidades finalizadas."
    background_4: "Com o objetivo de migrar para uma carreira mais focada em tecnologia, decidi voltar aos estudos e adquirir um MBA. Isso me ajudou a compreender melhor as motivações por trás de diferentes estratégias de negócio e abriu oportunidades para combinar minha paixão por tecnologia com o mundo das startups. Foi nesse período que passei a maior parte da minha carreira profissional, trabalhando com aplicativos de fidelidade, soluções de Software as a Service (SaaS) e implementando sistemas internos de Gestão de Relacionamento com o Cliente (CRM) para alinhar os processos internos à estratégia de startups que estavam em rápido crescimento."
    background_5_html: "Só entendi o real potencial transformador de sistemas de gamificação quando trabalhei com programas de fidelidade que impactavam os resultados financeiros de clientes. Foi nessa época que tive a oportunidade de implementar <a class='link' href='https://www.salesforce.com/crm/what-is-crm/' target='_blank'>softwares de CRM</a> e presenciar o impacto de competições internas e painéis de KPIs no desempenho das equipes de vendas."
    background_6: "Após a pandemia decidi alinhar meu foco à minha paixão e voltei a desenvolver habilidades técnicas de programação e criação de produtos. Hoje dedico-me a explorar ativamente as complexidades envolvidas na criação e aplicação de sistemas gamificados para as áreas de desenvolvimento pessoal, programas de recompensa, e educação e treinamento."
    background_7: "As possibilidades de gamificação na vida real e no trabalho são praticamente infinitas. As tecnologias estão cada vez mais acessíveis, e estamos no momento perfeito para usar soluções digitais de gamificação para influenciar resultados reais."
    background_quote_title: "Mary Poppins já dizia em 1964:"
    background_quote: "“Em todo trabalho que precisa ser feito, existe um elemento de diversão. Você encontra a diversão e o trabalho vira um jogo!”"
    ai_title: "Meu uso de ferramentas de IA"
    ai_1: "Aprendi na prática que repassar tarefas críticas acaba criando problemas de retenção de conhecimento e dificuldade de manter a qualidade do trabalho. Hoje, uso ferramentas de IA da mesma forma que antes usava vídeos do YouTube, pesquisas no Google e em fóruns: como um jeito de revisar e melhorar, e não como fonte de criação ou tomada de decisão. Nenhuma das minhas aplicações é definida ou construída por ferramentas de IA ou prompts — elas apenas são revisadas e aprimoradas através de um uso cuidadoso dessas ferramentas."
    ai_2: "Sendo um millennial, cresci nos primeiros anos da internet. Na época, a única forma de encontrar informação era em canais de mIRC e fóruns escondidos. Desde então, o jeito como acessamos informação online evoluiu rapidamente de buscas no Google, conversas no Stack Overflow, vídeos tutoriais no YouTube, comunidades como Reddit, e agora, a Inteligência Artificial."
    ai_3: "O que antes era uma grande quantidade de dados disponíveis publicamente para qualquer pessoa consumir agora está diluído por sistemas preditivos, projetados para detectar, aprender e reproduzir com base em dados existentes. Embora isso torne mais fácil e rápido encontrar informação, também levanta questões preocupantes sobre como esses sistemas são treinados e quais implicações futuras eles podem ter."
    ai_4: "Essa é uma area que todos nós estamos aprendendo nesse exato momento. Estamos realmente vivendo em um ponto de inflexão com o poder e a acessibilidade que as ferramentas de IA estão alcançando. É inegável que IA é uma ferramenta que não dá para ignorar."
    closing: "Agradeço pelo interesse. Estou curioso para saber sua opinião sobre esses assuntos. Fique à vontade para entrar em contato por e-mail ou WhatsApp!"
    projects_btn: "CONHEÇA MEUS PROJETOS"
    coin_game_btn: "EXPERIMENTE O JOGO DA MOEDA"
    cta: "Entre em contato:"
    cta_projects: "Confira outros projetos:"
  portfolio:
    fa:
      images:
        concepts: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_3_CoreConcepts_PT.png"
        logic: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_4_GameLogic_PT.png"
        design: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_5_DesignSystem_PT.png"
      category_html: "<span class='text-highlight'>Categoria:<br></span>Jogo Demo em Unity"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      inspiration_html: "<span class='text-highlight'>Inspiração:<br></span>Flappy Bird"
      index: "Índice:"
      objective: "Objetivos"
      objective_1: "O objetivo desse projeto foi desenvolver os fundamentos necessários para criação de jogos, com o foco principal de explorar as complexidades envolvidas em criar uma experiência gamificada."
      objective_2: "Desenvolver jogos completos é um processo complexo e demorado. Para criar uma experiência realmente memorável é preciso criar mecânicas inovadoras, desenvolver interfaces intuitivas, produzir artes chamativas, elaborar um loop de feedback de testes com usuários qualificados, e muitas outras etapas que requerem tempo e uma visão clara de onde o projeto deve chegar."
      objective_3_html: "O Flappy Astronaut foi inspirado por <a class='link' href='https://flappybird.io/' target='_blank'>Flappy Bird</a>, um jogo simples onde você deve manter um passaro no ar enquanto evita bater nos obstaculos. O escopo desse projeto foi limitado de propósito para focar na qualidade do processo de criação e não na substância do resultado final."
      objective_4: "Embora o design do Flappy Astronaut tenha sido fortemente inspirado em sua referência, o projeto recebeu mecânicas novas e um contexto diferente para alcançar o objetivo proposto. O cenário geral do jogo ganhou seu próprio ambiente espacial, novos elementos visuais, trilha sonora e mecânicas que combinavam com o novo tema."
      concepts: "Conceitos"
      concepts_1: "Em Flappy Astronaut, o jogador precisa guiar um astronauta por um campo de asteroides enquanto gerencia seu suprimento limitado de oxigênio. O objetivo final é simples: sobreviver o máximo de tempo possível."
      concepts_2: "Enquanto voa para cima, o astronauta precisa desviar de ondas de asteroides que se aproximam. Essas rochas estão distribuídas de forma espaçada, oferecendo mais oportunidades para o jogador tomar decisões rápidas de risco e recompensa."
      concepts_3: "O astronauta é controlado pelo jogador usando a barra de espaço do teclado. Cada pressionamento gera um impulso de velocidade para cima, consumindo 1 tanque de oxigênio. O jogador começa com 15 tanques e pode ficar sem oxigênio rapidamente se não fizer uma boa gestão. Tanques extras estão espalhados pelo campo de asteroides e precisam ser coletados estrategicamente ao longo da jornada."
      concepts_4: "A partida termina e o cronômetro para quando o astronauta morre ao colidir com um asteroide, bater na parte inferior ou superior da tela, ou ficar sem oxigênio."
      tech: "Stack"
      tech_1: "Unity é uma plataforma de desenvolvimento de jogos e oferece um ambiente completo com todas as ferramentas necessárias para criação de jogos e aplicativos."
      tech_2: "Unreal Engine e Godot eram outras duas ótimas alternativas, cada uma com sua própria arquitetura, benefícios e linguagem de programação. Entretanto, a Unity se destacou por ser uma boa alternativa para jogos menos complexos e disponibilizar fácil adaptação para distribuição em outras plataformas como iOS e Android."
      tech_3: "C# é a principal linguagem de programação usada no Unity. Esse projeto foi uma ótima oportunidade para desenvolver habilidades na criação de lógicas de jogo e prática de conceitos de modularidade, abraçstração e código limpo."
      tech_4: "Aseprite foi utilizado para criação das artes em pixel que compõem o sistema visual do projeto. O software é a melhor alternativa ao Photoshop quando o foco é pixel art, e oferece também ótimos recursos para animação com camadas e quadros separados."
      logic: "Lógica"
      logic_1: "O diagrama lógico é uma representação resumida dos scripts de controle anexados aos objetos de jogo no Unity. A simplicidade do escopo do jogo ajudou a manter os scripts independentes e fáceis de gerenciar. A principal complexidade deste projeto foi conectar todos os scripts e elementos visuais dentro do Unity."
      logic_2: "Essa foi a estrutura dos assets final desse projeto:"
      logic_3_html: "Aqui está um exemplo de um pequeno trecho do script AsteroidScript.cs com a função Update, que o Unity executa a cada frame. Ela controla o movimento horizontal do conjunto de asteroides e sua destruição quando atingem o limite fora da tela (deadZone). Mais detalhes podem ser explorados nos arquivos fonte disponíveis no <a class='link' href='https://github.com/ZPAlexis/FlappyAstronaut' target='_blank'>diretório desse projeto</a> no GitHub."
      design: "Design"
      design_1: "O objetivo com os visuais de Flappy Astronaut foi definir um tema que unificasse todos os elementos do jogo em um único estilo. O tema de Espaço Futurista foi a solução perfeita para combinar com as mecânicas de voo, os obstáculos e o novo sistema de sobrevivência com oxigênio."
      design_2_html: "Todos os sprites do projeto foram criados usando o Aseprite, e foram inspirados ou misturados com assets gratuitos disponíveis na <a class='link' href='https://assetstore.unity.com/' target='_blank'>Unity Asset Store</a>."
      demo: "Demo"
      demo_1: "Baixe o Flappy Astronaut no GitHub e experimente o jogo!"
      demo_btn: "Baixar Demo"
      dir_btn: "Ver Código Fonte"
      learnings: "Aprendizados"
      learnings_1: "Este projeto foi um sucesso para a descoberta das oportunidades que existem no universo de experiências interativas. Ele mostrou as possibilidades de uma engine como o Unity e destacou as complexidades envolvidas em planejar, construir e entregar uma experiência de jogo completa."
      learnings_2: "Esses são os aprendizados e observações mais importantes deste projeto:"
      learnings_li_1_html: "<span class='text-highlight'>Desenvolvimento de jogos é um processo complexo</span><p class='post-text'>Embora a criação inicial de um protótipo funcional não ser tão complicado, a transição para um jogo completo para o mercado revela a verdadeira complexidade do desenvolvimento de jogos. Entregar uma experiência completa, polida e coesa exige uma atenção rigorosa aos detalhes e um investimento significativo de tempo.</p>"
      learnings_li_2_html: "<span class='text-highlight'>A Unity Engine é muito flexível</span><p class='post-text'>Foi uma surpresa descobrir que a engine da Unity é tão versátil e fácil de usar. A plataforma oferece ferramentas que possibilitam não só a criação de jogos, mas também de aplicativos para celular e filmes.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Identidade visual faz toda a diferença</span><p class='post-text'>Dar um tema de design ao projeto ajudou muito a elevar a qualidade do resultado final sem adicionar muita complexidade. Os próximos passos seriam adicionar animações melhores e mais variedade nas interações entre jogador e cenário.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Profundidade e variedade de mecânicas</span><p class='post-text'>Flappy Astronaut tinha limites bem definidos, com mecânicas e objetivos simples. No entanto, se o projeto fosse evoluir além de um protótipo, precisaria de novos desafios para o jogador, um objetivo final mais claro e recompensador, melhores animações de feedback, mais variação de cenários e personalização de dificuldade.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Fundamentos de programação</span><p class='post-text'>O C# foi uma ótima oportunidade para revisar e aprimorar as bases de programação. Por ser uma linguagem orientada a objetos (OOP), ajudou a reforçar princípios de modularidade, abstração e código limpo.</p>"
      closing: "Obrigado por conhecer mais sobre esse projeto!"
    bs:
      images:
        concepts: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_3_CoreConcepts_PT.png"
        logic: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_4_GameLogic_PT.png"
        design: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_5_DesignSystem_PT.png"
      category_html: "<span class='text-highlight'>Categoria:<br></span>Jogo Demo em Unity"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      inspiration_html: "<span class='text-highlight'>Inspiração:<br></span>Vampire Survivors"
      index: "Índice:"
      objective: "Objetivo"
      objective_1: "Born Survivor é uma simples demo com o objetivo de desenvolver mecânicas de jogo mais complexas. Esse projeto teve como foco uma mecânica de jogo no estilo rogue-like “Escolha 1 entre 3”, para explorar as complexidades envolvidas e o potencial de uso em projetos futuros. O objetivo final não era lançar um jogo completo, mas criar uma experiência que cumprisse essa proposta."
      objective_2: "A mecânica rogue-like “Escolha 1 entre 3” é uma tendência recente popularizada pelo jogo Vampire Survivors. Ela oferece ao jogador a oportunidade de escolher uma entre três opções selecionadas aleatoriamente de uma longa lista de melhorias (poderes). Essa natureza aleatória cria um nível quase infinito de variedade em cada sessão de jogo e aumenta a longevidade da experiência."
      concepts: "Conceitos"
      concepts_1: "Born Survivor é um jogo em que o jogador precisa sobreviver o máximo de tempo possível enquanto ondas cada vez mais difíceis de inimigos aparecem a cada poucos segundos."
      concepts_2: "O jogador se move em um mapa pré-definido, derrotando inimigos com ataques e evitando se aproximar demais deles."
      concepts_3: "Gemas de experiência são deixadas no chão pelos inimigos derrotados e podem ser coletadas pelo jogador. Ao reunir uma quantidade suficiente dessas gemas o jogador sobe de nível."
      concepts_4: "A cada novo nível, o jogo é pausado para que o jogador possa escolher 1 entre 3 diferentes opções de poderes. Essas opções incluem diversas melhorias nas habilidades do personagem, como aumento de dano, velocidade de movimento e pontos de vida."
      concepts_5: "Ao combinar diferentes opções de poder, essa mecânica oferece uma ampla variedade de combinações possíveis, mantendo a experiência dinâmica e empolgante por mais tempo."
      tech: "Stack"
      tech_1_html: "Unity é uma plataforma de desenvolvimento de jogos e oferece um ambiente completo com todas as ferramentas necessárias para criação de jogos e aplicativos. Após nosso <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>projeto anterior</a> com o Unity, a plataforma foi a decisão lógica para desenvolver as mecânicas propostas neste projeto. Foi uma ótima oportunidade para testar algumas limitações relacionadas à quantidade de objetos instanciados ao mesmo tempo."
      tech_2: "C# é a principal linguagem de programação usada no Unity. Nesse projeto o foco foi aplicar lógicas mais complexas e modulares com a linguagem."
      logic: "Lógica"
      logic_1: "O diagrama lógico é uma representação resumida dos scripts de controle anexados aos objetos do jogo no Unity. Como experimento simples, o foco deste projeto estava principalmente na implementação correta do controlador de poderes e sua relação com outros scripts. A principal complexidade estava em criar um controlador do jogador que fosse influenciado pelos poderes escolhidos pelo usuário."
      logic_2_html: "Enquanto nosso <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>projeto anterior</a> mantinha uma estrutura de arquivos simples, desta vez o design ‘Escolha 1 entre 3’ e a estrutura de objetos do Unity exigiram a criação de arquivos de script separados para cada poder."
      logic_3: "Aqui está um pequeno trecho do script PowerUp_DamagePercent.cs para mostrar como os dados do jogador são manipulados."
      logic_4: "O próximo script é o PowerUpPool.cs. Essa lógica escolhe aleatoriamente três poderes da lista disponível e gera os objetos do jogo como opções para o usuário escolher, usando a função GeneratePowerUpOptions."
      logic_5_html: "Mais detalhes podem ser explorados nos arquivos fonte disponíveis no <a class='link' href='https://github.com/ZPAlexis/BornSurvivor' target='_blank'>diretório desse projeto</a> no GitHub."
      design: "Design"
      design_1: "Born Survivor não tinha requisitos específicos de sistema visual. Como o objetivo estava focado no sistema de poderes, todas as decisões de design visual e os elementos artísticos foram obtidos de fontes gratuitas, incluindo a Unity Asset Store."
      demo: "Demo"
      demo_1: "Baixe o Born Survivor no GitHub e experimente o jogo!"
      demo_btn: "Baixar Demo"
      dir_btn: "Ver Código Fonte"
      learnings: "Aprendizados"
      learnings_1_html: "Este projeto teve um foco mais restrito do que nossa <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>experiência anterior</a> com desenvolvimento de jogos. Enquanto o projeto anterior buscava entender as complexidades de todo o processo, desta vez o foco foi aprofundar nas complexidades específicas envolvidas em criar mecânicas de jogo interessantes."
      learnings_2: "Esses são os aprendizados e observações mais importantes deste projeto:"
      learnings_li_1_html: "<span class='text-highlight'>Mecânicas de jogo interessantes levam tempo para serem refinadas</span><p class='post-text'>Criar uma mecânica de jogo simples pode ser rápido e fácil, mas torná-la envolvente e realmente gratificante exige tempo e refinamento. Born Survivor incluíu mecânicas para destacar o foco principal nos poderes, mas desenvolver outros pilares fundamentais, como combate, comportamento dos inimigos e variedade, teria levado muito mais tempo para atingir um nível de qualidade aceitável para um produto final.</p>"
      learnings_li_2_html: "<span class='text-highlight'>‘Escolha 1 entre 3’ é uma ótima forma de aumentar a rejogabilidade</span><p class='post-text'>O objetivo principal confirmou a hipótese de que mesmo uma implementação simples da mecânica ‘Escolha 1 entre 3’ pode ter impactos notáveis na experiência do usuário. A promessa de variedade cria um senso de possibilidades, incentivando experimentação e maior engajamento. Em Born Survivor esse potencial foi mantido propositalmente limitado, mas com investimento adequado em uma experiência completa, essa mecânica poderia gerar resultados positivos impressionantes.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Limitações do Unity</span><p class='post-text'>O Unity executa a função Update a cada frame para cada objeto de jogo que possui um script anexado. Isso significa que o número de elementos na tela com um script pode impactar significativamente o desempenho se não for gerenciado corretamente. Em vez de instanciar e destruir objetos com scripts (como inimigos), a prática recomendada seria usar um buffer de objetos, reutilizando-os conforme necessário, em vez de destruí-los totalmente após o uso.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Fundamentos de programação</span><p class='post-text'>Com mecânicas mais complexas, ficou imediatamente claro que manter o código modular e organizado é fundamental para manter e aprimorar projetos semelhantes no futuro. Revisão e refatoração frequentes do código são tarefas críticas que não podem ser negligenciadas e precisam ser previstas no escopo de qualquer projeto futuro.</p>"
      closing: "Obrigado por conhecer mais sobre esse projeto!"
