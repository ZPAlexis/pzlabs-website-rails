      category_html: "<span class='text-highlight'>Category:<br></span>Full-Stack Web Application"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      index: "Index:"
      architecture: "Architecture"
      concepts: "Concepts"
      evolution: "Evolution"
      stack: "Decisions"
      gamification: "Gamification"
      api: "API"
      deployment: "Deploy"
      design: "Design"
      timeline: "Plan"
      learnings: "Learnings"
      overview_1: "A portfolio website engineered as a real product, with localization support, tests, CI/CD, security hardening, and a reproducible deployment I fully control. Built to display my technical abilities to deliver production-grade projects and showcase my interests on gamified applications that drive engagement metrics. The website you are visiting is the project."
      architecture_1_html: "Every layer was purposefully designed to be reproducible as something I can rebuild from scratch on demand. The production environment updates from a single push to <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main' target='_blank' rel='noopener'>main</a>. GitHub Actions runs the test suite, builds the image from a multi-stage Dockerfile, and provisions the host with a docker-compose file."
      architecture_2_html: "Each layer's place in the stack was a deliberate choice, arrived through several stages of evolution until it reached its current form (detailed in <a class='link' href='#evolution'>section 4</a>). Here's the reasoning behind them:"
      architecture_layer_cicd_label: "CI/CD Layer — GitHub"
      architecture_layer_cicd_flow: "GitHub push → Actions (CI: scan + test) → Actions (CD: SSH deploy)"
      architecture_layer_cicd: "The suite covers routing, page rendering, the coin-collection flow, and database-backed model logic. Deliberately written so a broken build doesn't reach production."
      architecture_layer_server_label: "Server Layer — Hostinger VPS & Docker"
      architecture_layer_server_1: "Caddy (TLS) → Docker Compose → web (Puma) + db (Postgres)"
      architecture_layer_server_2_html: "A single Hostinger VPS turned out to be the right balance of cost and operational simplicity for a project this size. This layer went through the most evolution — see more details in <a class='link' href='#evolution'>section 4</a>."
      architecture_layer_app_label: "App Layer — Ruby on Rails"
      architecture_layer_app_1: "Locale routing with i18n → Gamification JS ↔ Event API → Metrics caching ↔ PostgreSQL"
      architecture_layer_app_2: "The project began as plain HTML and JavaScript, but Rails was the right tool as it grew: a robust, lean monolith that consolidated every service without the overhead of external micro-services this project didn't need."
      architecture_layer_content_label: "Content Layer — Rails i18n"
      architecture_layer_content: "Supporting multiple languages was a must for this portfolio. Rails' native i18n made it straightforward with locale-scoped routes, strings pulling from YAML files, and quickly serving the full experience in English and Portuguese."
      architecture_layer_client_label: "Client Layer — Gamification JS"
      architecture_layer_client: "An interactive game where visitors collect three hidden coins, track their own progress, and see the running total collected by everyone else. It's a small, honest demonstration of how game-like design can drive engagement, and a reflection of my interest in building gamified systems."
      architecture_layer_data_label: "Data Layer — PostgreSQL"
      architecture_layer_data: "Each visitor's coin progress lives in their browser's localStorage, while an anonymous event log in Postgres aggregates collection across all visitors, giving the experience a sense of shared community without storing any personal information."
      concepts_intro: "This project was created with the intention to display three core concepts:"
      concepts_li_1_html: "<span class='text-highlight'>A living portfolio.</span><p class='post-text'>A production environment that's self-hosted, easily reproducible, and fully under my control that ships with one <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/commits/main/' target='_blank' rel='noopener'>git push</a>.</p>"
      concepts_li_2_html: "<span class='text-highlight'>Production discipline.</span><p class='post-text'>Multi-stage Docker builds, SSH deployment pipeline, 12-hour API caching, CI security scans, a real test suite, CSP, and rate limiting. Project management and attention to detail that isn’t necessary for a personal portfolio, but that demonstrates how I’d treat any client’s system.</p>"
      concepts_li_3_html: "<span class='text-highlight'>Measurable engagement with gamification.</span><p class='post-text'>Coin game that feeds a real API, and a homepage that loops the experience with live global counts. A gamified user experience that showcases measurable engagement.</p>"
      concepts_outro: "These core concepts were the guiding principles that guided every page and navigation decisions. The gamification experience was designed as the entry point to earn the visitor's attention before leading them through the portfolio content toward contact. The flow below is the user journey that guided every navigation and layout decision before a single line of code was written."
      evolution_intro: "While developing this project, the back-end structure and hosting architecture evolved through different stages, each as a response to real constraints and a consistent push to reduce complexity and cost without losing technical control."
      evolution_phase1_heading: "Phase 1 — GitHub Pages, no back-end"
      evolution_phase1_1: "GitHub Pages, raw HTML, Javascript, CSS"
      evolution_phase1_2: "The goal was to get the project live quickly using only free resources, with no backend and no external services. GitHub Pages handled hosting and was the perfect kick-start to the project."
      evolution_phase1_3: "With the static foundation in place, the next step was giving the gamification loop a closing step. Visitors could collect coins, but with no backend there was no way to record collections or surface community progress."
      evolution_phase1_4: "Migrated due to:"
      evolution_phase1_5: "The gamification loop had no closing step. Visitors collected coins but couldn't see community impact. A real API was needed to close that loop."
      evolution_phase2_heading: "Phase 2 — AWS + GitHub Pages"
      evolution_phase2_1: "AWS (EC2 + RDS), Node.js, Express.js, MySQL, HTML, Javascript, CSS"
      evolution_phase2_2: "To back the gamification experience with real data, I built a Node.js API on AWS EC2 and connected it to an RDS MySQL instance. AWS made the setup straightforward, but for a single-developer personal project it meant maintaining two managed services and absorbing South American datacenter costs. Switching to North American AWS servers would have reduced the bill, but the two managed services and the variable, usage-based pricing were still project risks."
      evolution_phase2_3: "With the architecture in place, I focused on keeping it lean by adding server-side caching to reduce the number of hits to the RDS instance on every page load, and unified the cache invalidation with the coin collection write transaction so the cache stayed accurate without a separate step."
      evolution_phase2_4: "Key decisions:"
      evolution_phase2_5: "Added server-side caching to reduce RDS traffic on every page visit."
      evolution_phase2_6: "Unified cache invalidation with the coin write transaction for accuracy and efficiency."
      evolution_phase2_7: "Migrated due to:"
      evolution_phase2_8: "Two managed services (EC2 + RDS) added operational overhead that was hard to justify for a single-developer project."
      evolution_phase2_9: "AWS was running at around $40 USD per month via the free-tier credits, with no ceiling on future costs as usage could grow. Switching to North American AWS servers would have only partially addressed the pricing while still leaving two managed services and a variable monthly bill. Hostinger's 2-year fixed cost plan at $30 BRL (~$6 USD) per month, also hosted in North America, eliminated both problems at once."
      evolution_phase3_heading: "Phase 3 (current) — Hostinger VPS + Rails"
      evolution_phase3_1: "Hostinger, Docker, Ruby on Rails, PostgreSQL, Caddy"
      evolution_phase3_2: "I refactored the project into a Rails monolith and hosted it on a single Hostinger VPS provisioned with Docker Compose. Everything previously split across GitHub Pages, EC2 and RDS now lives in one reproducible environment, deployed automatically on every push to main."
      evolution_phase3_3: "The monolith eliminated the round-trip latency of an external API call and the EC2 + RDS running costs. It also made the community counter update in real time on every coin collection with no page reload and no polling — something that wasn't practical with an external API."
      evolution_phase3_4: "Railway was evaluated as an alternative, but a VPS gives full visibility into the environment with no abstractions hiding the infrastructure, and the flexibility to keep extending it with new services down the line."
      evolution_phase3_5: "Key decisions:"
      evolution_phase3_6: "Consolidated EC2 API + RDS into a single Rails monolith with one codebase, one server, and lower fixed cost."
      evolution_phase3_7: "Docker Compose provisioning, fully reproducible from source, and deployed automatically on every push."
      evolution_phase3_8: "Real-time community counter, with updates on every collection, no page reload or polling required."
      stack_intro: "Some decisions taken in this project were deliberate from day one, while others emerged as the project evolved. Both reflect how I evaluated tradeoffs and made technical choices during this process."
      stack_decisions_heading: "Decisions I deliberately made:"
      stack_defaults_heading: "Rails 8 defaults I adopted:"
      stack_decision_1_html: "<p class='post-text'><span class='post-emphasis'>Bilingual i18n</span> with <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main/config/locales' target='_blank' rel='noopener'>locales</a>-scoped <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/routes.rb' target='_blank' rel='noopener'>routes</a> (scope '(:locale)', locale: /en|pt/) to reach both audiences without maintaining separate pages or codebases.</p>"
      stack_decision_2_html: "<p class='post-text'><span class='post-emphasis'>Locale detection fallback chain</span> (URL → cookie → Accept-Language header in <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/application_controller.rb' target='_blank' rel='noopener'>ApplicationController</a>) so visitors get the right language automatically, with no manual selection required.</p>"
      stack_decision_3_html: "<p class='post-text'><span class='post-emphasis'>Hand-built CSS</span> design system with design <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>tokens.css</a> and no CSS framework, to develop full ownership of the visual language and avoid introducing a framework dependency.</p>"
      stack_decision_4_html: "<p class='post-text'><span class='post-emphasis'>Gamified experience</span> with coin-collection and three distinct mini-games: <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/index.js' target='_blank' rel='noopener'>index.js</a> initiating the hidden box coin, momentum-based bar to fill on <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/fillBar.js' target='_blank' rel='noopener'>fillBar.js</a>, and <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/rock-paper-scissors.js' target='_blank' rel='noopener'>rock-paper-scissors.js</a> game; with localStorage persistence via <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>gameState.js</a> to demonstrate how gamification can drive engagement and reflect my genuine interest in building gamified systems.</p>"
      stack_decision_5_html: "<p class='post-text'><span class='post-emphasis'>Event-tracking API</span> <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/api/events_controller.rb#L6' target='_blank' rel='noopener'>POST /api/record-event</a> recording each coin per anonymous client to give the gamification loop a measurable end-point and connect individual actions to a shared community total.</p>"
      stack_decision_6_html: "<p class='post-text'><span class='post-emphasis'>Server-aggregated live metrics</span> <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb' target='_blank' rel='noopener'>MetricsCalculator</a> surfaced as global counters on the homepage to add a community dimension that gives each individual collection a shared meaning and motivates further participation.</p>"
      stack_decision_7_html: "<p class='post-text'><span class='post-emphasis'>12-hour Rails cache</span> on <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb#L3' target='_blank' rel='noopener'>MetricsCalculator#L3</a> data to keep database traffic lean and avoid recalculating the same values on every page load.</p>"
      stack_decision_8_html: "<p class='post-text'><span class='post-emphasis'>Cache invalidation</span> on new collection <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb#L8' target='_blank' rel='noopener'>MetricsCalculator#L8</a> refreshing metrics in the same transaction as the coin write to keep the counter accurate without a separate step.</p>"
      stack_decision_9_html: "<p class='post-text'><span class='post-emphasis'>Anonymous client identity</span> via httpOnly, SameSite=Lax, 1-year UUID cookie <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/controllers/api/events_controller.rb#L48' target='_blank' rel='noopener'>EventsController#L48</a> to collect participation data without requiring accounts, consent dialogs, or any personal information from the visitor.</p>"
      stack_decision_10_html: "<p class='post-text'><span class='post-emphasis'>Migrating off AWS</span> (EC2 + RDS) to a single <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/Dockerfile' target='_blank' rel='noopener'>Docker</a> host for cost and operational simplicity.</p>"
      stack_decision_11_html: "<p class='post-text'><span class='post-emphasis'>Docker Compose</span> <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml' target='_blank' rel='noopener'>docker-compose.yml</a> on a single VPS for a consolidated, reproducible environment deployed automatically on every push.</p>"
      stack_decision_12_html: "<p class='post-text'><span class='post-emphasis'>GitHub Actions CI</span> test suite (unit + system tests, Brakeman, bundler-audit, importmap audit, RuboCop) and retry-hardened SSH CD <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main/.github/workflows' target='_blank' rel='noopener'>.github/workflows/</a> to maintain production discipline and ensure a broken build never reaches the live environment.</p>"
      stack_decision_13_html: "<p class='post-text'><span class='post-emphasis'>Security hardening:</span> CSP, rate limiting <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/initializers/rack_attack.rb#L3' target='_blank' rel='noopener'>Rack::Attack</a>, CSRF, model-level coin validation <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/models/coin_event.rb#L6' target='_blank' rel='noopener'>CoinEvent</a>, full test suite; to prevent regressions and apply the same security standards I would on any client project.</p>"
      stack_default_1_html: "<p class='post-text'><a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml#L21' target='_blank' rel='noopener'>Puma</a> as the Rails application server and <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/docker-compose.yml#L2' target='_blank' rel='noopener'>Caddy</a> as the reverse proxy, both Rails-friendly defaults for a single-VPS deployment.</p>"
      stack_default_2_html: "<p class='post-text'>Migrated from MySQL (used in Phase 2 due to AWS RDS defaults) to PostgreSQL in Phase 3, which has deeper Active Record support and is Rails' preferred database (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/database.yml' target='_blank' rel='noopener'>config/database.yml</a>).</p>"
      stack_default_3_html: "<p class='post-text'>Gamification <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>logic</a> was written before the Rails migration and kept in vanilla JS. Stimulus is designed for light server-rendered interactivity, not stateful game loops, so the original approach remained the right fit.</p>"
      stack_default_4_html: "<p class='post-text'>Production Docker hardening with non-root user, jemalloc memory allocator, and bootsnap precompile (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/Dockerfile' target='_blank' rel='noopener'>Dockerfile</a>) for a leaner and faster container and to keep resource usage low on a fixed-cost VPS.</p>"
      stack_default_5_html: "<p class='post-text'>Solid Cache running off the database for the MetricsCalculator's 12-hour cache (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/environments/production.rb#L55' target='_blank' rel='noopener'>production.rb</a>) to avoid running a separate Redis instance and keep all persistence within the existing database.</p>"
      stack_default_6_html: "<p class='post-text'>Importmap-rails shipping ES modules (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/config/importmap.rb' target='_blank' rel='noopener'>config/importmap.rb</a>) to serve JavaScript without a build step, keeping the deployment pipeline simple and removing Node as a dependency.</p>"
      stack_default_7_html: "<p class='post-text'>PWA manifest enabled for mobile UX with no additional offline logic (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/views/layouts/application.html.erb#L19' target='_blank' rel='noopener'>application.html.erb#L19</a>) so visitors on mobile can install the site as an app if they choose to.</p>"
      gamification_1: "Gamification is the application of game elements to motivate user engagement, an area I have a genuine interest in. The goal was to demonstrate how simple game mechanics can make a personal portfolio page memorable, with the entire experience designed to unfold across a single scroll of the homepage."
      gamification_2: "The diagram above outlines the three-stage flow: discovery across the page scroll, goal clarity through the overlay, and the community payoff at the end. Each game was hand-written in vanilla JS as a small independent module, with no game framework involved. The sections below cover how each piece was built."
      gamification_3: "Core elements of the game experience:"
      gamification_li_1_html: "<span class='text-highlight'>Hidden Coin <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/index.js' target='_blank' rel='noopener'>index.js</a></span><p class='post-text'>A coin intentionally hidden on the page as the first discovery challenge. The overlay hints at its location so visitors can return to collect it if they scroll past.</p>"
      gamification_li_2_html: "<span class='text-highlight'>Fillbar Game <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/fillBar.js' target='_blank' rel='noopener'>fillBar.js</a></span><p class='post-text'>A momentum-based bar that gets filled by repeated presses of the button and decays over time if left alone. A built-in timer tracks completion speed, stores the personal best, and encourages repeated attempts to beat it.</p>"
      gamification_li_3_html: "<span class='text-highlight'>Rock Paper Scissors Game <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/rock-paper-scissors.js' target='_blank' rel='noopener'>rock-paper-scissors.js</a></span><p class='post-text'>A three-option game where the computer picks at random. Results are tracked across sessions with a running win, tie, and loss count displayed in the overlay.</p>"
      gamification_li_4_html: "<span class='text-highlight'>Central Game State <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js#L11' target='_blank' rel='noopener'>gameState.js#L11</a></span><p class='post-text'>A state manager that coordinates all coin logic without a framework. Each collection follows a consistent pattern: update state, persist to localStorage, check for completion, sync to the server, and refresh the community metrics. Coin state is stored in localStorage for persistence across visits and synced to the server on each collection. This keeps the experience stateful without requiring a login, while still recording events for the community metrics. No external library involved.</p>"
      gamification_li_5_html: "<span class='text-highlight'>Overlay Summary <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/uiElements.js#L23' target='_blank' rel='noopener'>uiElements.js</a></span><p class='post-text'>The connecting element that turns three separate mini-games into one coherent experience. It tracks collection progress, hints at each coin location, and displays the community view with live participation stats.</p>"
      gamification_li_6_html: "<span class='text-highlight'>Live Community Metrics <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js#L50' target='_blank' rel='noopener'>gameState.js#L50</a></span><p class='post-text'>Each collection is logged anonymously to the database, contributing to a live community count surfaced to every visitor. The metrics are cached on each write and protected by rate limiting to keep the data reliable.</p>"
      api_1: "Each coin collection is recorded as an anonymous event — no account, no personal data, just a UUID stored in an httpOnly cookie that persists across visits."
      api_2_html: "On collection, <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/javascript/logic/gameState.js' target='_blank' rel='noopener'>gameState.js</a> writes to localStorage to keep the game state client-side, then calls the API to record the event server-side. Coin names are validated against a fixed list before the write, and the endpoint is rate-limited to prevent abuse."
      api_3_html: "<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/services/metrics_calculator.rb' target='_blank' rel='noopener'>MetricsCalculator</a> aggregates the coin_events table into community totals and caches the result for 12 hours, so every new visitor gets fast homepage counters without triggering a fresh database query on each arrival."
      deployment_1_html: "A push to <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/tree/main' target='_blank' rel='noopener'>main</a> runs the full CI flow on GitHub Actions (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/.github/workflows/ci.yml' target='_blank' rel='noopener'>.github/workflows/ci.yml</a>). Security scans (Brakeman, bundler-audit, importmap audit), a RuboCop linting pass, and a test suite covering controller responses, model validations, MetricsCalculator caching logic, and a Selenium headless browser smoke test all run in parallel. Only a green build proceeds to deploy."
      deployment_2_html: "The deploy workflow (<a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/.github/workflows/deploy.yml' target='_blank' rel='noopener'>.github/workflows/deploy.yml</a>) connects via SSH, runs the multi-stage Docker build, and brings the stack up with docker-compose. Retry logic was added after hitting intermittent SSH timeouts from the GitHub Actions runners."
      design_1: "The decision to hand-build the design system rather than reach for Tailwind or Bootstrap was intentional. This project was an opportunity to develop my own design skills and build something that was genuinely mine from end to end. A framework would have been faster, but speed wasn't the goal here."
      design_2_html: "The result is a <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>tokens.css</a> file that drives the entire visual language — typography, colour scale, spacing, and breakpoints — keeping the styling consistent across the games, the project pages, and the bilingual layout without a framework dependency."
      design_3: "A few other deliberate design choices were: glass-morphism styled buttons, a bottom navigation bar on mobile, and a mobile-first layout that was fully designed in Figma before any CSS was written."
      timeline_1: "Each phase of this project was treated as a complete, shippable product before moving forward. The planning phase reflects a deliberate decision to design the full user experience in Figma before writing any code. The monitoring phase at the end was not unplanned cleanup; it represents the point where the architecture was stable enough to layer in production polishing, comprehensive testing, and security hardening."
      timeline_2: "Phase 3 was not part of the original project plan. It was introduced as a necessary step after the constraints found in Phase 2. AWS felt like the right production environment at the time, but the operational overhead and cost of running EC2 and RDS for a single-developer project proved hard to justify. That constraint led to discovering the Rails monolith approach and consolidating everything onto a single VPS. The result was a better fit for the scope of this project that wouldn't have been found without going through Phase 2 first."
      learnings_intro_1: "This project set out to be a living portfolio. A place to demonstrate my interest in gamification and showcase my abilities as a solutions engineer and developer. Along the way, a more specific question emerged: how much production discipline could I bring to a personal site? The answer covered infrastructure decisions, back-end architecture, gamification design, and continuous deployment. Every decision was deliberately made to reflect how I would treat any client's system."
      learnings_intro_2: "The end result is the page that you are visiting right now as this documentation and the product are one and the same."
      learnings_intro_3: "These are the most significant insights from building this project:"
      learnings_li_1_html: "<span class='text-highlight'>Right-sizing infrastructure. </span><p class='post-text'>The need for an external API uncovered how many infrastructure options exist and how easy it is to reach for more than a project actually needs. Implementing AWS in Phase 2 taught me that cloud-native can be over-engineered for the wrong scope.</p><br><p class='post-text'>Two managed services added cost and complexity the project didn't need. That constraint led to discovering the Rails monolith approach. When paired with a Docker host I can fully control, it proved to be the better engineering decision. The stack became simpler to operate, easier to reproduce, and a better fit for the actual scope of the project.</p>"
      learnings_li_2_html: "<span class='text-highlight'>Ruby on Rails lets a solo dev run lean.</span><p class='post-text'>The monolith structure meant fewer moving parts to build, monitor, and maintain. With the database directly connected to the application layer, the data model could evolve without negotiating an API contract between services.</p><br><p class='post-text'>Having the front-end and back-end in one codebase reduced context switching and allowed a more agile workflow throughout the project. Rails is not the right fit for every infrastructure, but for a solo developer with full ownership of the stack, it was the most productive decision in the project.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Gamification really shines when it's measurable.</span><p class='post-text'>One of the main goals was to showcase how simple gamification elements can engage visitors in a meaningful way. The three mini-games created a cohesive flow with a clear end goal, but the gamification only became truly compelling when it became measurable.</p><br><p class='post-text'>Adding live community metrics based on past visitor participation was the decision that closed the loop. It transformed individual engagement into a shared number that every visitor can see and contribute to. In my view, that community layer is what separates simple game-like elements from memorable gamification experiences.</p>"
      learnings_li_4_html: "<span class='text-highlight'>A design-token system pays off across pages.</span><p class='post-text'>One token file kept every page, game, and bilingual layout visually coherent without a framework dependency. The scope stayed small, the bundle stayed lean, and any style change propagated consistently across the whole site.</p><br><p class='post-text'>The decision to hand-build the design system rather than reach for a framework was deliberate. This project was an opportunity to develop my own design skills and build something entirely mine. A framework would have been faster, but full ownership of the visual language was the goal, and the <a class='post-code-link' href='https://github.com/ZPAlexis/pzlabs-website-rails/blob/main/app/assets/stylesheets/tokens.css' target='_blank' rel='noopener'>token</a> structure proved to be the right foundation for a project of this scope.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Treating a small project like production is the point.</span><p class='post-text'>This project was engineered with the same discipline I would apply to any client's system. Security hardening, rate limiting, a full test suite, and a proper CI/CD pipeline are all deliberate exercises. A personal portfolio does not strictly require any of them, but the habits formed on small projects like this one are the baseline any serious production system demands.</p><br><p class='post-text'>Enterprise systems are infinitely more complex, but the attention to detail that keeps them maintainable starts with exactly this kind of practice. The scale of the project was small. The standard applied was not.</p>"
      closing: "Thank you for checking out this project!"
    n8n_whatsapp:
      title: "WhatsApp Feed Automation"
      images:
        architecture: "/images/projects/n8n_whatsapp/Architecture_Diagram_EN.png"
        flow: "/images/projects/n8n_whatsapp/Flow_Diagram_EN.png"
        wf_participant: "/images/projects/n8n_whatsapp/Workflow_Participant_Manager.png"
        wf_rss: "/images/projects/n8n_whatsapp/Workflow_RSS_Check.png"
        wf_send: "/images/projects/n8n_whatsapp/Workflow_Send_Message.png"
        wf_cleanup_receival: "/images/projects/n8n_whatsapp/Workflow_Cleanup_receival.png"
        wf_cleanup_interactions: "/images/projects/n8n_whatsapp/Workflow_Cleanup_interactions.png"
        closing: "/images/projects/n8n_whatsapp/n8n_whatsapp_icon.png"
      category_html: "<span class='text-highlight'>Category:<br></span>Automation"
      stack_html: "<span class='text-highlight'>Tech Stack:</span>"
      index: "Index:"
      problem: "Problem"
      solution: "Solution"
      highlights: "Highlights"
      overview_1: "An automated WhatsApp messaging system that turns RSS-published articles into opt-in subscriber broadcasts, built for a real client under real constraints."
      problem_1: "The client is an established publishing company running two news platforms. Their websites publish news posts every day, and the business wanted to increase engagement with their readership and drive traffic back to the sites through a new channel. Their existing channel was an e-mail newsletter sent to subscribers every other week, but simply increasing that frequency risked subscriber fatigue, eroding a channel the business already relied on."
      problem_2: "These constraints shaped every technical decision that followed:"
      problem_li_1_html: "<span class='text-highlight'>The goal was engagement, not additional revenue generation.</span><p class='post-text'>The client wanted a direct-to-reader channel as an alternative to email newsletters. Direct messaging has a proven track record for engagement, and the objective was simply to route interested readers to new articles and lift pageview metrics. There was no checkout, no conversion funnel, no revenue event attached to a sent message.</p>"
      problem_li_2_html: "<span class='text-highlight'>No revenue tie-in meant this was pure cost-of-operation.</span><p class='post-text'>Because the channel produced no measurable revenue per message, it had to be treated as an operational cost that had to be kept at a minimum. This single constraint eliminated <b>Meta's official WhatsApp Business API</b>, which bills per message. At the volume the client expected, that recurring cost couldn't be justified against a metric like pageviews. WhatsApp was the chosen platform because of its near-universal penetration in the Brazilian market; <b>Telegram was kept on the table as a fallback</b> if WhatsApp-specific limitations ever became a problem.</p>"
      problem_li_3_html: "<span class='text-highlight'>The system had to reach thousands of readers reliably, every day.</span><p class='post-text'>The audience was expected to scale into the thousands, and daily publishing meant near-daily broadcasts, so the system had to stay robust once it was under real load. Because the cost constraint pushed the solution toward an <b>unofficial API</b> (more on that below), the operational risks required actively engineering <i>against account bans</i> <b>from day one</b>.</p>"
      solution_quote: "This project delivered a WhatsApp broadcast system that behaves reliably at scale while deliberately avoiding the official, paid API, because the business case couldn't carry that cost."
      solution_1: "The solution is a small set of n8n workflows running on a single Hostinger VPS via Docker, talking to WhatsApp through Evolution API (an unofficial gateway) behind a residential proxy. Readers self-subscribe by messaging a keyword; new articles are detected from RSS feeds and sent out to subscribers."
      architecture_heading: "Architecture"
      arch_li_1_html: "<span class='text-highlight'>Hostinger VPS:</span> Low-fixed-cost single-host foundation for the whole stack."
      arch_li_2_html: "<span class='text-highlight'>Docker (Compose):</span> Reproducible, one-command deployment of every service on a shared network."
      arch_li_3_html: "<span class='text-highlight'>n8n:</span> Orchestration layer hosting every subscriber, RSS, and send-pacing rule as a business workflow."
      arch_li_4_html: "<span class='text-highlight'>Evolution API:</span> Unofficial WhatsApp gateway (sends messages, delivers inbound messages to n8n via webhook)."
      arch_li_5_html: "<span class='text-highlight'>PostgreSQL:</span> Persistent store for n8n state and the project's data tables."
      arch_li_6_html: "<span class='text-highlight'>Redis:</span> Caching / session layer for Evolution API connection stability."
      arch_li_7_html: "<span class='text-highlight'>Caddy:</span> Reverse proxy with automatic TLS in front of the services."
      arch_li_8_html: "<span class='text-highlight'>Webshare:</span> Residential proxy that Evolution API routes through, to reduce ban risk from datacenter-IP patterns."
      evolution_heading: "API"
      evolution_subheading: "Evolution API vs Meta's official API"
      evolution_1: "Given the core constraint of this project that Meta's per-message pricing was a non-starter, Evolution API was an alternative open-source gateway that eliminated the per-message costs by driving a regular WhatsApp account. The decision to use an unofficial API carried its own set of risks:"
      evolution_risks_heading: "Risks accepted:"
      evolution_risk_1_html: "Evolution API operates outside WhatsApp's official API, so the phone number sending and receiving messages carries a real <b>ban/throttle risk</b>."
      evolution_risk_2_html: "The <b>dependency on an unofficial, community-maintained library</b> could also break with any future WhatsApp protocol changes."
      evolution_mitigations_heading: "Mitigations built in:"
      evolution_prevention_heading: "Prevention"
      evolution_prevention_1_html: "<b>Anti-ban send behavior</b> with jittered delays and batching (detailed below)."
      evolution_prevention_2_html: "<b>Residential proxy (Webshare)</b> so traffic doesn't originate from an obvious datacenter IP."
      evolution_recovery_heading: "Recovery / Continuity"
      evolution_recovery_1_html: "<b>Redis-backed session persistence</b> so the WhatsApp connection survives restarts instead of forcing risky re-authentications."
      evolution_recovery_2_html: "A <b>contingency for number replacement</b> via an online Brazilian number provider (brdid.com.br) in case the number was banned so it could be easily swapped without rebuilding the system."
      evolution_scale_heading: "What I'd do differently at scale:"
      evolution_scale_1_html: "If the channel ever justified the costs or compliance became a hard requirement, the right move would be to migrate to <b>Meta's official API</b>. For a cost-constrained engagement experiment, Evolution + proxy was the correct <i>pragmatic</i> call. However, it is definitely not a permanent, enterprise-scale architecture solution."
      evolution_scale_2_html: "<b>Telegram</b> remained a free and reliable fallback if WhatsApp risks ever outweighed its large reach benefits."
      workflows_heading: "Workflows"
      workflows_json_btn: "Workflows JSON"
      workflow_json_btn: "Workflow JSON"
      wf1_name: "Workflow: Participant Manager + Admin Messages"
      wf1_trigger: "webhook-triggered, fires on every inbound message"
      wf1_intro: "Handles the full subscriber lifecycle from a single WhatsApp inbox:"
      wf1_li_1_html: "<a class='post-code'><b>ENTRAR</b></a> (join) — registers the reader in the participant list with an explicit <b>consent step</b>, then sends a welcome message. Already-subscribed users get a friendly \"you're already in\" reply instead of a duplicate if they message the number again."
      wf1_li_2_html: "<a class='post-code'><b>SAIR</b></a> (leave) — a one-word unsubscribe that removes the reader from the list and confirms the exit."
      wf1_li_3_html: "<b>Welcome / info / exit messaging</b> with <b>interaction-state tracking</b> so the system never sends the same lifecycle message twice in a short window."
      wf1_li_4_html: "<b>Abuse load throttling</b> with a temporary \"interaction lock\" guards the system against rapid-fire inbound messages stressing the server or triggering spam mechanisms."
      wf1_li_5_html: "<b>Hidden admin broadcast channel</b> so a client-only number can send custom messages delivered to all subscribers through the same send path. This feature was built ahead of an anticipated need, giving the client a channel for ad-hoc announcements."
      wf2_name: "Workflow: RSS Check"
      wf2_trigger: "scheduled, hourly"
      wf2_intro: "Keeps the news feed in sync and triggers delivery for anything new:"
      wf2_li_1_html: "Polls both publication feeds every hour."
      wf2_li_2_html: "<b>Deduplicates</b> each post against the <a class='post-code'>News List</a> table by its <a class='post-code'>post_guid</a>, so a post is only ever broadcast <b>once</b> regardless of how many times it appears in the feed."
      wf2_li_3_html: "Hands every genuinely-new post off to the shared send sub-workflow."
      wf3_name: "Workflow: Send Message to Participants"
      wf3_trigger: "shared sub-workflow, called by both of the above"
      wf3_intro_html: "This is the single send path for the entire system. Both the RSS workflow and the admin broadcast call it, so there is <b>one</b> place that knows how to safely deliver a message to the audience:"
      wf3_li_1_html: "<b>Batched delivery</b> where participants are processed 5 at a time rather than blasting the whole list at once."
      wf3_li_2_html: "<b>Per-participant, per-message idempotency</b> checks the <a class='post-code'>Participant Receival List</a> before sending. If a participant already received this exact message, it's skipped. A re-run or double-trigger can never double-send."
      wf3_li_3_html: "<b>Randomized pacing</b> with delays between sends, varied per message, so traffic doesn't look like an automated burst."
      lifecycle_heading: "Data"
      lifecycle_subheading: "Table maintenance and cleanup"
      lifecycle_1: "Two small scheduled jobs keep the data tables healthy and prevent bloat at scale:"
      lifecycle_li_1_html: "<b>Receival-list cleanup</b> <a class='post-code-link break' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/workflows/Data%20cleanup_%20Participant%20Receival%20List.json' target='_blank' rel='noopener'>Workflow JSON</a> <i>(every 7 days)</i> — deletes send-records older than 30 days, so the idempotency table doesn't grow unbounded over the system's lifetime."
      lifecycle_li_2_html: "<b>Info-interaction cleanup</b> <a class='post-code-link break' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/workflows/Data%20cleanup_%20Info%20Interactions.json' target='_blank' rel='noopener'>Workflow JSON</a> <i>(every 6 hours)</i> — expires <a class='post-code'>info</a>-type interaction state after 12 hours, allowing a returning reader to get the welcome message again after a period of inactivity."
      lifecycle_2_html: "The idempotency checks guarantee the 'send exactly once' behavior, ensuring correctness, while the 30-day and 12-hour checks are <i>separate retention jobs</i> to prune old rows, maintaining sustainability."
      deployment_heading: "Deployment"
      deployment_subheading: "CI/CD + Docker"
      deployment_1_html: "The entire stack is defined in <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/docker-compose.yaml' target='_blank' rel='noopener'>docker-compose.yaml</a> and deployed via a <b>two-stage GitHub Actions pipeline</b> <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/.github/workflows/deploy.yml' target='_blank' rel='noopener'>.github/workflows/deploy.yml</a> that runs on every push to <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/tree/main' target='_blank' rel='noopener'>main</a>:"
      deployment_step_1_html: "<b>Validate</b> checks out the code, generates a throwaway <a class='post-code'>.env</a> from <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/.env.example' target='_blank' rel='noopener'>.env.example</a>, and runs <a class='post-code'>docker compose config -q</a> to fail fast on any compose-file syntax error <i>before</i> anything touches the server."
      deployment_step_2_html: "<b>Deploy</b> only runs if validation passes. Connects to the Hostinger VPS over SSH (credentials/keys held as GitHub secrets), then runs <a class='post-code'>git reset --hard origin/main</a> to guarantee the host matches the repo exactly, followed by <a class='post-code break'>docker compose pull docker compose up -d --remove-orphans</a> to roll out new images."
      deployment_2_html: "The <a class='post-code'>reset --hard</a> strategy keeps deploys <b>deterministic</b>. The running host is always an exact mirror of <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/tree/main' target='_blank' rel='noopener'>main</a>, never a drifted snapshot. Secrets live only in the VPS <a class='post-code'>.env</a>; a redacted <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/.env.example' target='_blank' rel='noopener'>.env.example</a> documents the required keys. <a class='post-code-link' href='https://github.com/ZPAlexis/n8n-evolution-whatsapp/blob/main/Caddyfile' target='_blank' rel='noopener'>Caddyfile</a> handles reverse proxying and automatic TLS, so services are reachable over HTTPS with no manual certificate management."
      highlights_1: "A few decisions defined the engineering of this project:"
      highlights_li_1_html: "<span class='text-highlight'>The constraint <i>was</i> the design.</span><p class='post-text'>\"No revenue per message\" was a major factor defining the solution. It dictated the API choice, which dictated the ban risk, which dictated the anti-ban engineering.</p>"
      highlights_li_2_html: "<span class='text-highlight'>Anti-ban engineering.</span><p class='post-text'>Jittered delays, batching, residential proxying, and session persistence were core pillars of the solution, not bolted-on safety nets.</p>"
      highlights_li_3_html: "<span class='text-highlight'>Lean automation workflows.</span><p class='post-text'>Funneling both broadcast triggers through a single shared sub-workflow meant the hardest parts — pacing, idempotency, batching — were solved once, not duplicated per trigger. Permanent dedup checks guaranteed correctness, while scheduled cleanup jobs kept that correctness affordable over time.</p>"
      highlights_li_4_html: "<span class='text-highlight'>Built-in contingency planning.</span><p class='post-text'>A pre-planned number-replacement route and a Telegram fallback meant the highest-likelihood failure mode had an answer ready instead of becoming a crisis.</p>"
      closing_1: "This was a deliberately lean, cost-constrained solution to a real business problem. The delivery included a proper tool for the given constraints and a clear upgrade path when those constraints change."
      closing_2: "Thank you for checking out this project!"
  notifications:
    notification_title_1: "Congratulations! 🎉"
    notification_description_1: "You've found all coins and completed game 🥳"