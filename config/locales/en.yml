  about:
    bio_availability: "Looking for opportunities"
    bio_role: "Solutions Engineer"
    bio_location: "São Paulo, Brazil"
    services: "Solutions"
    intro_1: "I'm Alexis Coelho. A Solutions Engineer, MBA, Production Engineer, and most importantly — a huge nerd."
    intro_2_html: "<span>I create digital solutions that motivate customer engagement.</span> My applications are aimed towards individual personal improvement, brand loyalty programs, and internal training and aligment tools."
    intro_3: "My focus is on the design and implementation of game-like applications with the potential to generate memorable experiences."
    services_title: "Services"
    intro_4: "These are the categories of solutions that I specialize in and offer to my clients:"
    intro_services_title_1: "Automations & Integrations"
    intro_services_description_1: "Consulting on internal and external operational processes. Including reviews of collaboration workflows, system automations, and process integrations that impact efficiency, decision making, sales funnel, and client engagement."
    intro_services_title_2: "Gamification Systems"
    intro_services_description_2: "Design and development of interactive user experiences and logic systems influenced by game elements for existing or new applications. Focused on influencing user's actions towards personal goals and brand's performance indicators."
    intro_services_title_3: "Website Development"
    intro_services_description_3: "Full-stack implementation from ideation to launch. Including back-end servers and front end application development. Fully independent solutions or based on platforms according to client's standards."
    skills_title: "Technologies"
    intro_5: "These are the main technologies that I frequently use in my projects or have used extensively in the past:"
    intro_prototyping: "Prototypes"
    intro_kpis: "KPI Dashboards"
    interests_title: "Interests"
    interests_1: "Understanding how and why certain technologies work is what drove most of my educational decisions and led me to where I am today. One of the biggest questions that I remember having when I was a kid was — how does a home refrigerator actually work — it seemed like magic and I needed to understand it. The same happened with programming, games, and gamification systems, which led me to try to understand the psycology and decision making involved in irrationally motivating reward programs."
    interests_2: "I’ve been tinkering with computers and software programs since I was a kid. At the age of 11 my parents gave me my first home computer, and a few years later I was already assembling and dissassembling machines and setting up servers for online games."
    interests_3: "As a self-proclaimed huge nerd, the intersection between game mechanics and real life is something that fascinated me ever since I was a kid. Collecting all stickers on a sticker-book or getting a star on an exam I did well in early school are one of the earliest examples I experienced of game-like reward systems in real life."
    interests_4: "As you can probably figure out by now, gaming has been a constant interest I’ve kept throughout my life. It started as a way to disconnect from reality, but it evolved into a fascination of how interactive experiences can be purposefully crafted to create unforgettable user experiences. Today my goal is to explore that fascination and apply creative game-like systems to the right real-life situations."
    interests_5: "These are some of main areas of interest:"
    interests_technology_title: "Technology"
    interests_technology: "Digital experiences, productivity tools, and smart devices."
    interests_gaming_title: "Gaming"
    interests_gaming: "Story-focused experiences, indie games, and board games."
    interests_fantasy_title: "Fantasy"
    interests_fantasy: "Fictonal worlds, Dungeons & Dragons, and classic books."
    interests_3dp_title: "3D-Printing"
    interests_3dp: "Model design, 360 Fusion, and functional models."
    interests_fitness_title: "Fitness"
    interests_fitness: "Well-being, stretching, calisthenics, and meditation."
    background_title: "Background"
    background_1: "I've worked with a variety of small and medium sized businesses and interfaced with many different types of revenue-generating teams."
    background_2: "Most of my career focus was influenced by my Process Engineering degree, where I developed an ability to understand complex processes and re-align them to evolving business strategies."
    background_3: "My first career step after graduation was at an Oil & Gas supplier of compressed gas skids, where my focus was to project manage the entire process from procurement of equipment to the delivery of the assembled units."
    background_4: "In an effort to pivot into a more technology-driven career I decided to go back to school and get an MBA. This led me to better understand the motivations behind different business strategies and opened opportunities to leverage my passion for technology in the startup space. This is where I spent most of my professional career working with Customer Loyalty Apps, Software as a Service solutions (SaaS), and implementing internal Customer Resource Management (CRM) systems to align internal processes with new strategies for startups that were in rapid growth."
    background_5_html: "I only truly understood the transformative potential of gamification systems when I worked with loyalty programs that had a real impact on financial results. It was during this time that I had the opportunity to implement <a class='link' href='https://www.salesforce.com/crm/what-is-crm/' target='_blank'>CRM softwares</a> and see the tangible impact of internal competitions and KPI dashboards on the performance of sales teams."
    background_6: "Following the pandemic, I decided to align my focus with my passion, returning to technical development in programming and product creation. Today, I am actively dedicated to exploring the complexities of designing and implementing gamified systems for personal development, loyalty programs, and corporate training."
    background_7: "The possibilities for gamification of real life and work situations are endless. Technology is only becoming more and more accessble. This the perfect time to start leveraging gamified digital solutions to motivate real-life consequences."
    background_quote_title: "Mary Poppins said this in 1964:"
    background_quote: "“In every job that must be done, there’s an element of fun. You find the fun, and the job is a game!”"
    ai_title: "My usage of AI tools"
    ai_1: "I’ve learned from personal experience that offloading critical tasks leads to a slippery slope of knowledge retention issues and work quality maintenance. I use AI tools the same way I used Youtube videos, Google searches, and forum deep-dives in the past. It’s a way to review and improve instead of an avenue for creation and decision-making. None of my applications are defined or built by AI tools and prompts, they are only reviewed and improved by carefully planned interfacing with these tools."
    ai_2: "Being a millenial, I grew up in the early stages of the internet. The only way to find information at the time was through mIRC channels and hidden forums. Since then, the way we access information online evolved quickly from Google searches, Stack Overflow conversations, Youtube tutorial videos, Reddit and other social communities, and now Artificial Intelligence."
    ai_3: "What was once a large amount of data publicly available to be consumed by anyone is now diluted by predictive systems that are designed to detect, learn, and re-produce based existing data. While this makes it easier and faster to find information, it also brings worring questions on the way these systems are trained and the future implications they could have."
    ai_4: "This is an area that we are all learning from right now. We are truly living in an inflection moment with how powerful and acessible AI tools are becoming. It is undeniable that it is a tool that can’t be ignored."
    closing: "I wanted to thank you for taking the time to read this far, and I’m very interested to know your opinion on these topics. Feel free to reach out with your thougts over by email or WhatsApp!"
    projects_btn: "CHECK OUT MY PROJECTS"
    cta: "Get in touch:"
    cta_projects: "Check out some of our other projects:"
  portfolio:
    fa:
      images:
        concepts: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_3_CoreConcepts.png"
        logic: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_4_GameLogic.png"
        design: "/images/projects/flappy_astronaut/PZLabs_Portfolio_FlappyAstronaut_5_DesignSystem.png"
      category_html: "<span class='text-highlight'>Category:<br></span>Demo Unity Game"
      stack_html: "<span class='text-highlight'>Tech Stack:<br></span>C#, Unity"
      inspiration_html: "<span class='text-highlight'>Inspiration:<br></span>Flappy Bird"
      index: "Index:"
      objective: "Objective"
      objective_1: "The goal of this project was to develop the fundamentals needed to create an interactive game, with the main objective to explore the depth of complexities involved in creating a gamified experience."
      objective_2: "Developing a fully fledged game is a complex and time-consuming process. In order to create an experience that is truly memorable there really is a huge amount of effort required to develop the inovative game mechanics, design intuitive user interfaces, produce quality art assets, create a feedback loop from qualified users, and many other steps that require time and a clear vision of what the project should become."
      objective_3_html: "Flappy Astronaut was inspired by <a class='link' href='https://flappybird.io/' target='_blank'>Flappy Bird</a>, a simple game where you must keep a bird in the air while not touching any of the obstacles. The scope was limited on purpose so I could focus on the process and not the end result."
      objective_4: "Although Flappy Astronaut’s game design was heavily based on it’s influence, the project received it’s own twist and unique setting. The general setting of the game received it’s own outer space environment, art assets, music, and new mechanics that aligned with the new theme."
      concepts: "Core Concepts"
      concepts_1: "In Flappy Astronaut, the player must guide an astronaut through a field of asteroids while managing their limited supply of oxygen. The end goals is to simply stay alive for as long as possible."
      concepts_2: "While flying upwards, the astronaut has to dodge waves of incoming asteroids. These rocks are loosely scattered to provide more opportunities for the player to make quick risk-versus-reward decisions."
      concepts_3: "The astronaut is controlled by the user with the keyboard’s space bar. Every press leads to a jet of upward speed that consumes 1 oxygen tank. The player starts with 15 oxygen tanks and can quickly run out if not managed correctly. Oxygen tanks are scattered around the asteroid field and have to be strategically collected throughout the journey."
      concepts_4: "The run ends and the clock stops when the astronaut dies by hitting an asteroid, going below the edges of the screen, or running out of oxygen."
      tech: "Tech Stack"
      tech_1: "Unity is a game engine platform that offers a complete package of all the tools needed to create a game or app."
      tech_2: "Unreal Engine and Godot were other two great options I could have used as alternatives, with each using a different architecture, benefits, and programming language. However, Unity was choosen for being great for simpler games and for offering simple tools to adapt and distribute to other platforms like iOS and Android."
      tech_3: "C# is the primary programming language used in Unity. This was the perfect opportunity to further develop skills in scripting game logic, and practice the principles of modularity, abstraction, and clean code."
      tech_4: "Aseprite was used to create the pixel art proposed by the project’s visual design system. The software is the best alternative to Photoshop when it comes to pixel art, and provides great support for animation with layers & frames as separated concepts."
      logic: "Game Logic"
      logic_1: "The logic diagram is a summarized representation of the controlling scripts attached to Unity’s game objects. The simplicity of the game’s scope helped keep the scripts independent and easy to manage. The main complexity of this project was to put it all together in Unity."
      logic_2: "This was the final asset structure of this project:"
      logic_3_html: "Here is an example of a simple snippet from the AsteroidScript.cs with the Update function that Unity runs on every frame. It controls a set of asteroid’s horizontal movement and its destruction when reaching the off-screen threshold (deadZone). More details can be explored in the source code available in <a class='link' href='https://github.com/ZPAlexis/FlappyAstronaut' target='_blank'>this project's directory</a> on GitHub."
      design: "Visual Design System"
      design_1: "The goal with the visuals of Flappy Astronaut was to define a theme that could align all elements of the game to a single style. The theme of Futuristic Outer-Space was the perfect solution for the flying mechanics, obstacles, and new oxygen survival mechanics."
      design_2_html: "All project sprites were created using Aseprite, and were inspired or mixed with freely available assets from <a class='link' href='https://assetstore.unity.com/' target='_blank'>Unity's Asset Store</a>."
      demo: "Demo & Download"
      demo_1: "Download Flappy Astronaut on GitHub and give it a try!"
      demo_btn: "Download Demo"
      dir_btn: "Check Source Code"
      learnings: "Learnings"
      learnings_1: "This project was a success in uncovering the breath of possibilities in the universe of interactive experiences. It showed the possibilities of an engine like Unity, and highlighted the complexities involved in planning, building, and delivering a fully fledged game experience."
      learnings_2: "These are the most significant learnings and insights from this project:"
      learnings_li_1_html: "<span class='text-highlight'>Game development is complex process.</span><p class='post-text'>While the initial creation of a functional prototype is relatively straightforward, transitioning to a production-ready title reveals the true complexity of game development. Delivering a complete, polished, and cohesive experience requires a rigorous attention to detail and a significant investment of time.</p>"
      learnings_li_2_html: "<span class='text-highlight'>Unity Engine is really flexible.</span><p class='post-text'>It was a surprise to discover how easy-to-use and versatile this engine is. The platform offers tools that enable not only the creation of games, but also mobile applications and movies.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Visual identity goes a long way.</span><p class='post-text'>Giving the project a design theme really helped to add quality to the end result without much further complexity. The next steps would have been to add better animations and variety to the stage and player interactions.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Depth and variety of mechanics.</span><p class='post-text'>Flappy Astronaut had clear boundaries with simple game mechanics and objectives. However, if this project were to evolve beyond just a prototype demo, it would need a variety of additional player challenges, a clearer and more rewarding end-goal, better feedback animations, more stage variations, and difficulty customizations.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Coding fundamentals.</span><p class='post-text'>C# provided a great opportunity to revisit and build better coding foundations. Being a Object-Oriented Programming (OOP) language, it provided a good refresher on the principles of modularity, abstraction, and clean code.</p>"
      closing: "Thank you for checking out this project!"
    bs:
      images:
        concepts: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_3_CoreConcepts.png"
        logic: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_4_GameLogic.png"
        design: "/images/projects/born_survivor/PZLabs_Portfolio_BornSurvivor_5_DesignSystem.png"
      category_html: "<span class='text-highlight'>Category:<br></span>Demo Unity Game"
      stack_html: "<span class='text-highlight'>Tech Stack:<br></span>C#, Unity"
      inspiration_html: "<span class='text-highlight'>Inspiration:<br></span>Vampire Survivors"
      index: "Index:"
      objective: "Objective"
      objective_1: "Born Survivor is a simple demo game with the objective of developing more complex game mechanics. This project was focused on a “Pick 1 of 3” feature, a rogue-like style mechanic to uncover the complexities derived from it and potential for future usage in other projects. The end goal was not to release a fully developed game, but just an experience that accomplished this objective."
      objective_2: "A “Pick 1 of 3” rogue-like mechanic is a recent trend popularized by the game Vampire Survivors. It presents the user with the opportunity to choose one in three choices that get randomly selected from a long list of power-ups. The randomized nature creates an almost infinite level of variety to each gameplay session and gives additional longevity to the whole experience."
      concepts: "Core Concepts"
      concepts_1: "Born Survivor is a game where the player needs to survive for as long as possible while increasingly difficult waves of enemies are spawned every few seconds."
      concepts_2: "The player moves around a pre-defined map, killing each enemy by striking them with an attack and staying away from their reach."
      concepts_3: "Experience gems are dropped on the ground from defeated enemies and can be collected by the player, granting a level whenever enough experience gems have been collected."
      concepts_4: "Each level gained stops the game to give the player the ability to pick 1 of 3 different power-up options. These options include a variety of improvements to the player’s abilities, such as increased damage for attacks, running speed, and life."
      concepts_5: "By combining different power options this specific mechanic provides a vast range of combinations, keeping the experience fresh and exciting for a longer time."
      tech: "Tech Stack"
      tech_1_html: "Unity is a game engine platform that offers a complete package of all the tools needed to create a game or app. After our <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>previous project</a> with Unity, the platform was the logical decision to develop the mechanics proposed by this project. It was a great opportunity to test some of the limitations related to the amount of objects instantiated at the same time."
      tech_2: "C# is the primary programming language used in Unity. In this project the focus was to apply more complex and modular logic with the language."
      logic: "Game Logic"
      logic_1: "The logic diagram is a summarized representation of the controlling scripts attached to Unity’s game objects. As a simple experiement, this project’s focus was mainly on the correct implementation of the power-up controller and it’s relation to other scripts. The main complexity was around creating a player controller that is influenced by the power-ups choosen by the user."
      logic_2_html: "While our <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>previous project</a> kept a lean file structure, this time the “Pick 1 of 3” design and Unity’s game object structure forced the creation of a separate script files for each PowerUp."
      logic_3: "Here is a brief snippet from PowerUp_DamagePercent.cs to showcase how the player data was manipulated."
      logic_4: "This next script is from PowerUpPool.cs. This logic randomly chooses three power ups from the available list and generates the game objects as options for the user to choose from with the GeneratePowerUpOptions function."
      logic_5_html: "More details can be explored in the source code available in <a class='link' href='https://github.com/ZPAlexis/BornSurvivor' target='_blank'>this project's directory</a> on GitHub."
      design: "Visual Design System"
      design_1: "Born Survivor did not have any specific visual design system requirements. Since the objective focused on the power-up system, all visual design decisions and art assets were gathered from freely available sources including the Unity’s Asset Store."
      demo: "Demo & Download"
      demo_1: "Download Born Survivor on GitHub and give it a try!"
      demo_btn: "Download Demo"
      dir_btn: "Check Source Code"
      learnings: "Learnings"
      learnings_1_html: "This project had a narrower focus than our <a class='link' href='/projects/flappy_astronaut.html' target='_blank'>previous venture</a> into game development. While our previous project was aimed at understanding the complexities of the whole process, this time the focus was on the specific complexities involved in developing interesting game mechanics."
      learnings_2: "These are the most significant learnings and insights from this project:"
      learnings_li_1_html: "<span class='text-highlight'>Interesting game mechanics take time polish.</span><p class='post-text'>Creating a simple game mechanic can be quick and easy to implement, however, getting it to a point that is engaging and truly rewarding takes time and polish. Born Survival included several game mechanics to highlight the main focus with the powerups, but getting other fundamental pillars like combat, enemy behaviour, and variety would have taken a much longer time to refine and reach an acceptable quality level for an end product.</p>"
      learnings_li_2_html: "<span class='text-highlight'>“Pick 1 of 3” is a great way to add replayability.</span><p class='post-text'>The main objective proved the hypothesis that even a very simple implementation of a “Pick 1 of 3” mechanic can have notable impacts on user experience. The promise of variety creates a sense of possibilities and drives experimentation and increased engagement by the end user. In Born Survivor this potential was kept purposefuly limited, but with the proper investment on a complete experience this mechanic could have impressive positive results.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Unity’s limitations.</span><p class='post-text'>Unity runs an Update function on every frame for each game object that has a script attached to it. This means that the number of elements on screen that has a script can have a significant impact on performance if not handled correctly. Instead of instantiating and destroying scripted game objects (like enemies), the best practice would have been to Pool these objects and reuse them as needed instead of fully destroying them after use.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Coding fundamentals.</span><p class='post-text'>With more complex mechanics, it became instantly obvious that keeping our code modular and organized is critical to properly maintain and keep improving on other similar project in the future. Frequent code revision and refactoring is a critical task that can’t be overlooked and absolutely needs to be accounted for in our projects’ scope.</p>"
      closing: "Thank you for checking out this project!"
    trofy:
      images:
        concepts: "/images/projects/trofy/Trofy_3_CoreConcepts_PZLabs_Portfolio.png"
        gamification: "/images/projects/trofy/Trofy_3_1_Gamification_PZLabs_Portfolio.png"
        user: "/images/projects/trofy/Trofy_4_GameLogic_PZLabs_Portfolio.png"
        logic: "/images/projects/trofy/Trofy_5_Logic_PZLabs_Portfolio.png"
        notifications: "/images/projects/trofy/Trofy_6_NotificationSystem_PZLabs_Portfolio.png"
        design: "/images/projects/trofy/Trofy_7_Design_PZLabs_Portfolio.png"
        wireframe: "/images/projects/trofy/Trofy_8_Ideation_PZLabs_Portfolio.png"
        roadmap: "/images/projects/trofy/Trofy_9_MVPRoadmap_PZLabs_Portfolio.png"
      category_html: "<span class='text-highlight'>Category:<br></span>Productivity Mobile App"
      stack_html: "<span class='text-highlight'>Tech Stack:<br></span>C#, Unity, iOS and Android"
      inspiration_html: "<span class='text-highlight'>Inspiration:<br></span>Duolingo"
      index: "Index:"
      objective: "Objective"
      objective_1: "Trofy is a mobile app with the objective to help you achieve your goals by gamifying personal objectives and reinforcing the development of good habits. The name refers to the act of receiving a trophy given to yourself by yourself."
      objective_2: "After years of struggling with procrastination as a kid, it slowly became clear that the best way to create motivation to maintain new habits was to document and review the progress over time. Seeing historical trends of even slightly improvements motivated me to keep going. Trofy's objective was to transform that metodology into a game that would inspire others to focus on personal improvement with a gamified approach."
      objective_3: "The app’s idea was inspired by Duolingo’s gamified education methodology, where users have clear progression goals, get points to spend on extra lives, and can easily opt-in to compete with other users in in-app ladders with multiple levels of difficulty ranks."
      concepts: "Core Concepts"
      concepts_1: "The app’s structure is divided in a few core pillars:"
      concepts_2: "1. Gamified experience"
      concepts_3: "While Trofy is a “to-do like” app in it’s core, it’s main aspect is to resemble a game. Users should feel like playing a game by completing in-app tasks for personal objectives."
      concepts_4: "The gamification system was designed to motivate users with two positive feedback loops on Challenge completion: a trophy as a reward, and a level-up system on reaching a certain consistency of use."
      concepts_5: "A challenge in Trofy is defined by an activity that must be completed at least once a week. This means that a user can earn a Trophy every week, and a level on that challenge every month."
      concepts_6: "Trofy’s MVP focused on building the core gamified experience, including the user interface and visual feedback. Community features like competitions, objective sharing, and account systems were kept out of scope as they would require significant backend development beyond the project’s allocated timeframe. However, these features would be essential to make the app truly gamified and ready for a full v1.0 release."
      concepts_7: "2. Personal improvement goal setting"
      concepts_8: "The main drive for using the app is to be able to quickly create, update, and review important personal objectives."
      concepts_9: "A challenge in Trofy is defined by a task that must be completed at least once a week. When creating a challenge, a user has the ability to customize two main properties:"
      concepts_10_html: "<span class='text-highlight'>Frequency (Difficulty):</span><p class='post-text'>Defines the number of days in a week that the task needs to be completed. A challenge can be a single weekly task, or something that needs to be completed everyday.</p>"
      concepts_11_html: "<span class='text-highlight'>Weekly Start Date (Start):</span><p class='post-text'>Defines when the challenge starts and the day of the week that it restarts. If you define an objective to start on a Wednesday, it means the weekly challenge always starts on Wednesdays and ends on Tuesdays at the end of the day.</p>"
      concepts_12: "3. Progress tracking & performance review"
      concepts_13: "Each objective clearly displays their progress so the user can have a general idea of how they are doing in a quick glance. Since each objective can have a different amount of days required to be completed in a week, each objective will have their own percentage progression for that week and history since it was created."
      concepts_14: "The user can also leave a short written note and rate from 1 to 5 stars each day of the week. This very simple feature can give the user some additional context when reviewing their progress at a later date."
      concepts_15: "The progress tab is where it all comes together to quickly show how much the user has improved since they started using the app. Being able to review overall progression in a quick glance should be the main motivating factor to bring users back to the app and to continue focusing on their personal priorities."
      user: "User Story Map"
      user_1: "Trofy’s goal of encouraging good habits guided the structure of the user journey. The experience was designed as a positive feedback loop — motivating users to go beyond their goals and return regularly to continue improving."
      user_2: "At its core, the app functions like a to-do list. The biggest difference outside of the gamified approach is the opportunity to fully track past progress, check trends, and provide opportunities for the user to reflect and reprioritize their objectives."
      tech: "Tech Stack"
      tech_1: "Developing a few demo games previously in Unity inspired this project and provided a solid foundation for a gamified app. Unity provided a solid way to develop logic behind constantly animated objects and a seamless solution to port the application to iOS and Android mobile devices."
      tech_2: "Csharp is the programming language used in Unity. After learning the foundations of the language, it was refreshing to implement more challenging logic with the notifications controller, save and load systems, and day list managers."
      tech_3_html: "This was also the first time working with AI tools to improve on the code beign written and to help with more complex logic that was beyond my realm of knowledge. I wrote more details on my use of these tools on the <a class='link' href='#ai'>learnings section</a> and on our <a class='link' href='/about.html'>about page</a>."
      logic: "Information Architecture"
      logic_1: "The core component of Trofy’s logic system is focused on the Day List objects, it is used and referenced by all main components of the app."
      logic_2: "Every objective generates a list of days in a week’s period. This list is then updated by the User Controller through user input, and then accessed by the Date Controller to display today’s applicable objectives and any history of completion on the progress tab."
      logic_3: "This is the code that controls the initial generation of a week’s day list from the Objective Controller. Once the initial generated week is completed, the code automatically triggers the generation of additional weeks for the next objective periods."
      logic_4: "Another notable area from Trofy’s design is the logic behind the notifications sent by the app. Push notifications are one of the biggest benefits of working with mobile devices. In order to have an engaging and effective experience, it would be crucial to implement a system that provided periodic reminders to the user and motivational messages to bring them back after periods of inactivity."
      logic_5: "Trofy’s notifications system was structured with three types of notification schedules:"
      logic_6_html: "<span class='text-highlight'>Priority notifications</span><p class='indent'>Reminders on how many days left in a objective that still isn’t complete this week — “This is your last chance to get a 🏆 this week!”.</p>"
      logic_7_html: "<span class='text-highlight'>Restart notifications</span><p class='indent'>Reminders on new week starts — “Exercise starts again today, start strong 💪”.</p>"
      logic_8_html: "<span class='text-highlight'>Callback notifications</span><p class='indent'>Motivational reminders to bring back the user to the app after many days of inactivity — “Your struggles make you stronger. Your obstacles pave the way for success 💯”.</p>"
      logic_9: "Another feature worth a highligh was the logic behind the localization system built for the language switcher. With a simple tap, users can change the app’s language instantly."
      logic_10: "The localization system works by replacing text strings based on spreadsheet-style tables that map each interface element to its translation."
      design: "Visual Design System"
      design_1: "The goal with the visuals of Trofy was to make the whole experience feel like the user is playing a game. A “To-do” list is something you go back to checkmark what has been done, in Trofy you return to earn rewards on a game for completing those tasks. All elements used were purposefully choosen to resemble mobile games like Clash of Clans and designs from gamified apps like Duolingo."
      design_2_html: "Trofy’s main character was custom designed and created with Photoshop, while the rest of the UI elements were paid assets acquired from <a class='link' href='https://assetstore.unity.com/packages/2d/gui/gui-pro-casual-game-176695' target='_blank'>Unity’s Asset Store</a>."
      wireframe: "Wireframe"
      wireframe_1: "This is a simple wireframe that helped kick-start the project. The end result is far different than this example, but this process helped organize the information structure required for a better user experience."
      roadmap: "MVP Roadmap Structure"
      roadmap_1: "While this project was built as a test experiement on gamified experiences, the project’s roadmap was structured the same was as if this was a client’s project. The initial v0.1 MVP for Trofy was released for testing in six weeks, but the project stayed in development for a couple more months receiving updates up to v0.4 with the additions of the notification controller and fixes to issues found from user testing."
      demo: "Demo & Download"
      demo_1: "The app is available only on Android devices through an .apk file."
      demo_2: "Unfortunately it wasn't possible to keep the app running on the iOS and Android stores, as both platforms required frequent updates to keep test apps available."
      demo_btn: "Download .APK File"
      learnings: "Learnings"
      learnings_1: "This project covered most steps from product development, from ideation to release of an MVP test version for user testing on both iOS and Android devices. It also highlighted the possibilities of gamified applications through an engine like Unity, and further clarified the effort that would be needed to take this project all the way to a v1.0 release."
      learnings_2: "These are the most significant learnings and insights from this project:"
      learnings_li_1_html: "<span class='text-highlight'>Gamified experience potential.</span><p class='post-text'>The experience crafted with the visuals and features of Trofy were a great first step to create a fully gamified experience, but it wasn’t enough. To fully achieve that goal we would need to add support for user-driven competitions and community features for competing and sharing in-app objectives. This would require a significant time investment in structuring backend server structure that would go beyond the initial timeframe allocated for this project.</p>"
      learnings_li_2_html: "<span class='text-highlight'>Bridging the gap for a full release.</span><p class='post-text'>This project had a limited scope to ensure we delivered a working MVP that could properly communicate the value proposition envisioned with Trofy. Creating a sense of community with in-app competitions and leaderboards would be the next major pillar of focus before a full app release.</p>"
      learnings_li_3_html: "<span class='text-highlight'>Remote backend server support.</span><p class='post-text'>Trofy was developed to run fully locally and had no online functionality, which meant that our backend support was limited to the device’s local storage to function. Proper backend setup with a Node.js server for user authentication, user data storage, and future community features would be the required next steps for a potential full release.</p>"
      learnings_li_4_html: "<span class='text-highlight'>Mobile apps with Unity Engine.</span><p class='post-text'>Unity provides one of the best solutions to easily port an application as a native mobile app with iOS Xcode and Android Gradle projects. The process is so smooth that there’s very little code customization required to get the same application from one platform to the other. The only major difference we had to customize in Trofy was the notification system for different trigger structures in each platform.</p>"
      learnings_li_5_html: "<span class='text-highlight'>Coding with AI</span><p class='post-text'>This was the first time I tested the use of Artificial Intelligence chats for code review and it was an eye-opening experience. These tools are great for quickly building complex code, but they quickly become a detriment to the retention of information and re-application in future similar situations. I've learned that it's crucial to know how to discern when the application of the tool can truly be beneficial. There’s a full statement on my usage of AI on our <a class='link' href='/about.html#ai'>about page.</a></p>"
      closing: "Thank you for checking out this project!"
